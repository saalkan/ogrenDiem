e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 0\u003cbr\u003e\u003cbr\u003eThe natural world is full of relationships between\u003cbr\u003equantities that change. When we see these\u003cbr\u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent var\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Short Run Behavior\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eFunction Notation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Tables as Functions","\u003cb\u003eTables as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Solving and Evaluating Functions","\u003cb\u003eSolving and Evaluating Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Graphs as Functions","\u003cb\u003eGraphs as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Formulas as Functions","\u003cb\u003eFormulas as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t6\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Basic Toolkit Functions","\u003cb\u003eBasic Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t7\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Notation","\u003cb\u003eNotation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Domain and Range from Graphs","\u003cb\u003eDomain and Range from Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Piecewise Functions","\u003cb\u003ePiecewise Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 9\u003cbr\u003e\u003cbr\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real nu\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Graphical Behavior of Functions","\u003cb\u003eGraphical Behavior of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decrea\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Concavity","\u003cb\u003eConcavity\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions","\u003cb\u003eLinear Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 19\u003cbr\u003e\u003cbr\u003eAs you hop into a taxicab in Las Vegas, the meter\u003cbr\u003ewill immediately read $3.50; this is the \u201cdrop\u201d\u003cbr\u003echarge made when the taximeter is activated. After\u003cbr\u003ethat initial fee, the taximeter will add $2.76 for\u003cbr\u003eeach mile the taxi drives (Nevada Taxicab\u003cbr\u003eAuthority, retriev\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eCharacteristics of Power Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 24\u003cbr\u003e\u003cbr\u003eShown to the right are the graphs of\u003cbr\u003e\\(f(x)=x^{2}\\), \\(f(x)=x^{4}\\), and\u003cbr\u003e\\(f(x)=x^{6}\\), all even whole number powers.\u003cbr\u003eNotice that all these graphs have a fairly similar\u003cbr\u003eshape, very similar to the quadratic toolkit, but\u003cbr\u003eas the power increases the graphs flatte\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models","\u003cb\u003ePolynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 25\u003cbr\u003e\u003cbr\u003eAn oil pipeline bursts in the Gulf of Mexico,\u003cbr\u003ecausing an oil slick in a roughly circular shape.\u003cbr\u003eThe slick is currently 24 miles in radius, but\u003cbr\u003ethat radius is increasing by 8 miles each week.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short Run Behavior","\u003cb\u003eShort Run Behavior\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 26\u003cbr\u003e\u003cbr\u003eCharacteristics of the graph such as vertical and\u003cbr\u003ehorizontal intercepts and the places the graph\u003cbr\u003echanges direction are part of the short run\u003cbr\u003ebehavior of the polynomial. Like with all\u003cbr\u003efunctions, the vertical intercept is where the\u003cbr\u003egraph crosses the vertical axi\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Vertex","\u003cb\u003eShort run Behavior: Vertex\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 27\u003cbr\u003e\u003cbr\u003eWe now explore the interesting features of the\u003cbr\u003egraphs of quadratics. In addition to intercepts,\u003cbr\u003equadratics have an interesting feature where they\u003cbr\u003echange direction, called the vertex .\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Short Run Behavior\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts","\u003cb\u003eShort run Behavior: Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 28\u003cbr\u003e\u003cbr\u003eAs with any function, we can find the vertical\u003cbr\u003eintercepts of a quadratic by evaluating the\u003cbr\u003efunction at an input of zero, and we can find the\u003cbr\u003ehorizontal intercepts by solving for when the\u003cbr\u003eoutput will be zero. Notice that depending upon\u003cbr\u003ethe location of the graph\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts","\u003cb\u003eShort run Behavior: Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 29\u003cbr\u003e\u003cbr\u003eAs with any function, the vertical intercept can\u003cbr\u003ebe found by evaluating the function at an input of\u003cbr\u003ezero. Since this is evaluation, it is relatively\u003cbr\u003eeasy to do it for a polynomial of any degree.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts","\u003cb\u003eSolving Polynomial Inequalities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 31\u003cbr\u003e\u003cbr\u003eOne application of our ability to find intercepts\u003cbr\u003eand sketch a graph of polynomials is the ability\u003cbr\u003eto solve polynomial inequalities. It is a very\u003cbr\u003ecommon question to ask when a function will be\u003cbr\u003epositive and negative.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Writing Equations using Intercepts","\u003cb\u003eWriting Equations using Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 32\u003cbr\u003e\u003cbr\u003eSince a polynomial function written in factored\u003cbr\u003eform will have a horizontal intercept where each\u003cbr\u003efactor is equal to zero, we can form a function\u003cbr\u003ethat will pass through a set of horizontal\u003cbr\u003eintercepts by introducing a corresponding set of\u003cbr\u003efactors. factored form \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Estimating Extrema","\u003cb\u003eEstimating Extrema\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 33\u003cbr\u003e\u003cbr\u003eWith quadratics, we were able to algebraically\u003cbr\u003efind the maximum or minimum value of the function\u003cbr\u003eby finding the vertex. For general polynomials,\u003cbr\u003efinding these turning points is not possible\u003cbr\u003ewithout more advanced techniques from calculus.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem","\u003cb\u003eCompound Interest\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 40\u003cbr\u003e\u003cbr\u003eIn the bank certificate of deposit (CD) example\u003cbr\u003eearlier in the section, we encountered compound\u003cbr\u003einterest. Typically bank accounts and other\u003cbr\u003esavings instruments in which earnings are\u003cbr\u003ereinvested, such as mutual funds and retirement\u003cbr\u003eaccounts, utilize compound int\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 A Limit to Compounding","\u003cb\u003eA Limit to Compounding\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 41\u003cbr\u003e\u003cbr\u003eAs we saw earlier, the amount we earn increases as\u003cbr\u003ewe increase the compounding frequency. The table,\u003cbr\u003ethough, shows that the increase from annual to\u003cbr\u003esemi-annual compounding is larger than the\u003cbr\u003eincrease from monthly to daily compounding.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Compound Interest\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Graphs of Exponential Functions","\u003cb\u003eGraphs of Exponential Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 42\u003cbr\u003e\u003cbr\u003eLike with linear functions, the graph of an\u003cbr\u003eexponential function is determined by the values\u003cbr\u003efor the parameters in the function\u2019s formula. To\u003cbr\u003eget a sense for the behavior of exponentials, let\u003cbr\u003eus begin by looking more closely at the function\u003cbr\u003e\\(f(x)=2^{x}\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["What is a Function?","Function Notation","Tables as Functions","Solving and Evaluating Functions","Graphs as Functions","Formulas as Functions","Basic Toolkit Functions","Notation","Domain and Range from Graphs","Piecewise Functions","Graphical Behavior of Functions","Concavity","Linear Functions","Characteristics of Power Functions","Polynomials","Short Run Behavior","Short run Behavior: Vertex","Short run Behavior: Intercepts","Short run Behavior: Intercepts","Solving Polynomial Inequalities","Writing Equations using Intercepts","Estimating Extrema","Compound Interest","A Limit to Compounding","Graphs of Exponential Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,4.47213595499958,8.94427190999916,13.416407864998739,17.88854381999832,22.360679774997898,26.832815729997478,31.304951684997057,35.77708763999664,40.24922359499622,44.721359549995796,49.193495504995376,84.97058314499202,107.33126291998991,111.80339887498948,116.27553482998907,120.74767078498866,125.21980673998823,129.6919426949878,138.63621460498698,143.10835055998655,147.58048651498612,178.88543819998318,183.35757415498276,187.82971010998233],"y":[-0.04373048399610532,-0.5559786773527593,-0.45858789872258315,-0.49482079882295643,-0.5660348112668235,-0.712254794989864,-1.0,-0.6947764754656383,-0.4083308721041147,-0.2901542780764505,-0.22449795846394285,-0.18472764410369522,0.21235644370408055,0.40637315327650975,0.2309754669782752,0.03560819987887167,0.01663032820547713,-0.12830152978541398,0.003613712694697049,-0.07434605535531394,0.14400163790551931,0.33906471188441434,0.2674585093540021,0.32960803 s given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition using Formulas","\u003cb\u003eComposition using Formulas\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 14\u003cbr\u003e\u003cbr\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain of Compositions","\u003cb\u003eDomain of Compositions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 15\u003cbr\u003e\u003cbr\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Decomposing Functions","\u003cb\u003eDecomposing Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 16\u003cbr\u003e\u003cbr\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions","\u003cb\u003eGraphs of Linear Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 20\u003cbr\u003e\u003cbr\u003eWhen we are working with a new function, it is\u003cbr\u003euseful to know as much as we can about the\u003cbr\u003efunction: its graph, where the function is zero,\u003cbr\u003eand any other special behaviors of the function.\u003cbr\u003eWe will begin this exploration of linear functions\u003cbr\u003ewith a look at graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e  \u00b7 Compound Interest\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eModeling with Linear Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 21\u003cbr\u003e\u003cbr\u003eWhen modeling scenarios with a linear function and\u003cbr\u003esolving problems involving quantities changing\u003cbr\u003elinearly, we typically follow the same problem\u003cbr\u003esolving strategies that we would use for any type\u003cbr\u003eof function: Problem Solving Strategy Identify\u003cbr\u003echanging quantitie\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Fitting Linear Models to Data","\u003cb\u003eGraphical Behavior at Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 30\u003cbr\u003e\u003cbr\u003eIf we graph the function \\(f(x)=(x+3)(x-2)^{2}\u003cbr\u003e(x+1)^{3}\\), notice that the behavior at each of\u003cbr\u003ethe horizontal intercepts is different. At the\u003cbr\u003ehorizontal intercept x = -3, coming from the\u003cbr\u003e\\((x+3)\\) factor of the polynomial, the graph\u003cbr\u003epasses directly through th\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities","\u003cb\u003eFactor Theorem and Remainder Theorem\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 34\u003cbr\u003e\u003cbr\u003eIn the last section, we limited ourselves to\u003cbr\u003efinding the intercepts, or zeros, of polynomials\u003cbr\u003ethat factored simply, or we turned to technology.\u003cbr\u003eIn this section, we will look at algebraic\u003cbr\u003etechniques for finding the zeros of polynomials\u003cbr\u003elike \\(h(t)=t^{3} +4t^{2}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Real Zeros of Polynomials","\u003cb\u003eReal Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 35\u003cbr\u003e\u003cbr\u003eIn the last section, we saw how to determine if a\u003cbr\u003ereal number was a zero of a polynomial. In this\u003cbr\u003esection, we will learn how to find good candidates\u003cbr\u003eto test using synthetic division.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers","\u003cb\u003eLogarithmic Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 43\u003cbr\u003e\u003cbr\u003eA population of 50 flies is expected to double\u003cbr\u003eevery week, leading to a function of the form\u003cbr\u003e\\(f(x)=50(2)^{x}\\), where x represents the number\u003cbr\u003eof weeks that have passed. When will this\u003cbr\u003epopulation reach 500?\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eLogarithmic Properties\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 44\u003cbr\u003e\u003cbr\u003eIn the previous section, we derived two important\u003cbr\u003eproperties of logarithms, which allowed us to\u003cbr\u003esolve some basic exponential and logarithmic\u003cbr\u003eequations. properties of logs Inverse Properties:\u003cbr\u003e\\[\\log _{b} \\left(b^{x} \\right)=x\\] \\[b^{\\log _{b}\u003cbr\u003ex} =x\\] Exponentia\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Behaviors of the Toolkit Functions","Composition of Functions using Tables and Graphs","Composition using Formulas","Domain of Compositions","Decomposing Functions","Graphs of Linear Functions","Modeling with Linear Functions","Graphical Behavior at Intercepts","Factor Theorem and Remainder Theorem","Real Zeros of Polynomials","Logarithmic Functions","Logarithmic Properties"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[53.665631459994955,58.137767414994535,62.609903369994115,67.0820393249937,71.55417527999327,89.44271909999159,93.91485505499116,134.1640786499874,152.0526224699857,156.5247584249853,192.30184606498193,196.7739820199815],"y":[-0.3699399844546383,-0.6237052689954495,-0.5712714450195718,-0.48602338373953813,-0.2583191706381558,0.26610871157563964,0.3609839202748759,0.14791615162533672,0.5532553197158272,0.3763721104000041,0.3760663222991211,0.5258868811280166],"z":[0.49547862010672605,0.22771769733957528,-0.08870815070308705,-0.3207835639803548,-0.32617995689213913,-0.025784016156367835,-0.0923835077034571,-0.30014596168204943,-0.3676992371782866,-0.2589496271098339,0.30279136621721575,0.16065096389110578],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eTransformation of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 17\u003cbr\u003e\u003cbr\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Short Run Behavior\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eInverse Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 18\u003cbr\u003e\u003cbr\u003eA fashion designer is travelling to Milan for a\u003cbr\u003efashion show. He asks his assistant, Betty, what\u003cbr\u003e75 degrees Fahrenheit is in Celsius, and after a\u003cbr\u003equick search on Google, she finds the formula\u003cbr\u003e\\(C=\\dfrac{5}{9} (F-32)\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data\u003cbr\u003e  \u00b7 Linear Functions","\u003cb\u003eFitting Linear Models to Data\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 22\u003cbr\u003e\u003cbr\u003eIn the real world, rarely do things follow trends\u003cbr\u003eperfectly. When we expect the trend to behave\u003cbr\u003elinearly, or when inspection suggests the trend is\u003cbr\u003ebehaving linearly, it is often desirable to find\u003cbr\u003ean equation to approximate the data.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions","\u003cb\u003eAbsolute Value Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 23\u003cbr\u003e\u003cbr\u003eSo far in this chapter we have been studying the\u003cbr\u003ebehavior of linear functions. The Absolute Value\u003cbr\u003eFunction is a piecewise-defined function made up\u003cbr\u003eof two linear functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Notation\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e  \u00b7 Characteristics of Power Functions","\u003cb\u003eArithmetic on Complex Numbers\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 36\u003cbr\u003e\u003cbr\u003eBefore we dive into the more complicated uses of\u003cbr\u003ecomplex numbers, let\u2019s make sure we remember the\u003cbr\u003ebasic arithmetic involved. To add or subtract\u003cbr\u003ecomplex numbers, we simply add the like terms,\u003cbr\u003ecombining the real parts and combining the\u003cbr\u003eimaginary parts.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Logarithmic Properties","\u003cb\u003eComplex Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 37\u003cbr\u003e\u003cbr\u003eComplex numbers allow us a way to write solutions\u003cbr\u003eto quadratic equations that do not have real\u003cbr\u003esolutions. Exercise \\(\\PageIndex{3}\\) Find the\u003cbr\u003ezeros of \\(f(x)=2x^{2} +3x+4\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Rational Functions","\u003cb\u003eRational Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s7_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 7 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 38\u003cbr\u003e\u003cbr\u003eIn the previous sections, we have built\u003cbr\u003epolynomials based on the positive whole number\u003cbr\u003epower functions. In this section, we explore\u003cbr\u003efunctions based on power functions with negative\u003cbr\u003einteger powers, called rational functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverses and Radical Functions","\u003cb\u003eInverses and Radical Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s8_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 8 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 39\u003cbr\u003e\u003cbr\u003eIn this section, we will explore the inverses of\u003cbr\u003epolynomial and rational functions, and in\u003cbr\u003eparticular the radical functions th
