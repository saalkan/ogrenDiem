              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t1", "label": "What is a Function?", "shape": "dot", "title": "\u003cb\u003eWhat is a Function?\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eThe natural world is full of relationships between\u003cbr\u003equantities that change. When we see these\u003cbr\u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent variable, and a corresp\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t2", "label": "Function Notation", "shape": "dot", "title": "\u003cb\u003eFunction Notation\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t3", "label": "Tables as Functions", "shape": "dot", "title": "\u003cb\u003eTables as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t4", "label": "Solving and Evaluating Functions", "shape": "dot", "title": "\u003cb\u003eSolving and Evaluating Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t5", "label": "Graphs as Functions", "shape": "dot", "title": "\u003cb\u003eGraphs as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t6", "label": "Formulas as Functions", "shape": "dot", "title": "\u003cb\u003eFormulas as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t7", "label": "Basic Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBasic Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t1", "label": "Notation", "shape": "dot", "title": "\u003cb\u003eNotation\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t2", "label": "Domain and Range from Graphs", "shape": "dot", "title": "\u003cb\u003eDomain and Range from Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t3", "label": "Piecewise Functions", "shape": "dot", "title": "\u003cb\u003ePiecewise Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real number value regardles\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t1", "label": "Graphical Behavior of Functions", "shape": "dot", "title": "\u003cb\u003eGraphical Behavior of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decreasing at \\(t =\\) 1, 3\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t2", "label": "Concavity", "shape": "dot", "title": "\u003cb\u003eConcavity\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t3", "label": "Behaviors of the Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBehaviors of the Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing/Decreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neither concave up nor dow\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t1", "label": "Composition of Functions using Tables and Graphs", "shape": "dot", "title": "\u003cb\u003eComposition of Functions using Tables and Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t2", "label": "Composition using Formulas", "shape": "dot", "title": "\u003cb\u003eComposition using Formulas\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as the input to the ou\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t3", "label": "Domain of Compositions", "shape": "dot", "title": "\u003cb\u003eDomain of Compositions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were undefined at a valu\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t4", "label": "Decomposing Functions", "shape": "dot", "title": "\u003cb\u003eDecomposing Functions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s5_t1", "label": "Transformation of Functions", "shape": "dot", "title": "\u003cb\u003eTransformation of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s6_t1", "label": "Inverse Functions", "shape": "dot", "title": "\u003cb\u003eInverse Functions\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eA fashion designer is travelling to Milan for a\u003cbr\u003efashion show. He asks his assistant, Betty, what\u003cbr\u003e75 degrees Fahrenheit is in Celsius, and after a\u003cbr\u003equick search on Google, she finds the formula\u003cbr\u003e\\(C=\\dfrac{5}{9} (F-32)\\).\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch2_s1_t1", "label": "Linear Functions", "shape": "dot", "title": "\u003cb\u003eLinear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs you hop into a taxicab in Las Vegas, the meter\u003cbr\u003ewill immediately read $3.50; this is the \u201cdrop\u201d\u003cbr\u003echarge made when the taximeter is activated. After\u003cbr\u003ethat initial fee, the taximeter will add $2.76 for\u003cbr\u003eeach mile the taxi drives (Nevada Taxicab\u003cbr\u003eAuthority, retrieved May 8, 2017.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch2_s2_t1", "label": "Graphs of Linear Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of Linear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen we are working with a new function, it is\u003cbr\u003euseful to know as much as we can about the\u003cbr\u003efunction: its graph, where the function is zero,\u003cbr\u003eand any other special behaviors of the function.\u003cbr\u003eWe will begin this exploration of linear functions\u003cbr\u003ewith a look at graphs.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch2_s3_t1", "label": "Modeling with Linear Functions", "shape": "dot", "title": "\u003cb\u003eModeling with Linear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen modeling scenarios with a linear function and\u003cbr\u003esolving problems involving quantities changing\u003cbr\u003elinearly, we typically follow the same problem\u003cbr\u003esolving strategies that we would use for any type\u003cbr\u003eof function: Problem Solving Strategy Identify\u003cbr\u003echanging quantities, and then carefull\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch2_s4_t1", "label": "Fitting Linear Models to Data", "shape": "dot", "title": "\u003cb\u003eFitting Linear Models to Data\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the real world, rarely do things follow trends\u003cbr\u003eperfectly. When we expect the trend to behave\u003cbr\u003elinearly, or when inspection suggests the trend is\u003cbr\u003ebehaving linearly, it is often desirable to find\u003cbr\u003ean equation to approximate the data.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch2_s5_t1", "label": "Absolute Value Functions", "shape": "dot", "title": "\u003cb\u003eAbsolute Value Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eSo far in this chapter we have been studying the\u003cbr\u003ebehavior of linear functions. The Absolute Value\u003cbr\u003eFunction is a piecewise-defined function made up\u003cbr\u003eof two linear functions.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t1", "label": "Characteristics of Power Functions", "shape": "dot", "title": "\u003cb\u003eCharacteristics of Power Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eShown to the right are the graphs of\u003cbr\u003e\\(f(x)=x^{2}\\), \\(f(x)=x^{4}\\), and\u003cbr\u003e\\(f(x)=x^{6}\\), all even whole number powers.\u003cbr\u003eNotice that all these graphs have a fairly similar\u003cbr\u003eshape, very similar to the quadratic toolkit, but\u003cbr\u003eas the power increases the graphs flatten somewhat\u003cbr\u003enear the\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t2", "label": "Polynomials", "shape": "dot", "title": "\u003cb\u003ePolynomials\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eAn oil pipeline bursts in the Gulf of Mexico,\u003cbr\u003ecausing an oil slick in a roughly circular shape.\u003cbr\u003eThe slick is currently 24 miles in radius, but\u003cbr\u003ethat radius is increasing by 8 miles each week.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t3", "label": "Short Run Behavior", "shape": "dot", "title": "\u003cb\u003eShort Run Behavior\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eCharacteristics of the graph such as vertical and\u003cbr\u003ehorizontal intercepts and the places the graph\u003cbr\u003echanges direction are part of the short run\u003cbr\u003ebehavior of the polynomial. Like with all\u003cbr\u003efunctions, the vertical intercept is where the\u003cbr\u003egraph crosses the vertical axis, and occurs when t\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s2_t1", "label": "Short run Behavior: Vertex", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Vertex\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWe now explore the interesting features of the\u003cbr\u003egraphs of quadratics. In addition to intercepts,\u003cbr\u003equadratics have an interesting feature where they\u003cbr\u003echange direction, called the vertex .\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s2_t2", "label": "Short run Behavior: Intercepts", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs with any function, we can find the vertical\u003cbr\u003eintercepts of a quadratic by evaluating the\u003cbr\u003efunction at an input of zero, and we can find the\u003cbr\u003ehorizontal intercepts by solving for when the\u003cbr\u003eoutput will be zero. Notice that depending upon\u003cbr\u003ethe location of the graph, we might have zero\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t1", "label": "Short run Behavior: Intercepts", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs with any function, the vertical intercept can\u003cbr\u003ebe found by evaluating the function at an input of\u003cbr\u003ezero. Since this is evaluation, it is relatively\u003cbr\u003eeasy to do it for a polynomial of any degree.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t2", "label": "Graphical Behavior at Intercepts", "shape": "dot", "title": "\u003cb\u003eGraphical Behavior at Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIf we graph the function \\(f(x)=(x+3)(x-2)^{2}\u003cbr\u003e(x+1)^{3}\\), notice that the behavior at each of\u003cbr\u003ethe horizontal intercepts is different. At the\u003cbr\u003ehorizontal intercept x = -3, coming from the\u003cbr\u003e\\((x+3)\\) factor of the polynomial, the graph\u003cbr\u003epasses directly through the horizontal interce\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t3", "label": "Solving Polynomial Inequalities", "shape": "dot", "title": "\u003cb\u003eSolving Polynomial Inequalities\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eOne application of our ability to find intercepts\u003cbr\u003eand sketch a graph of polynomials is the ability\u003cbr\u003eto solve polynomial inequalities. It is a very\u003cbr\u003ecommon question to ask when a function will be\u003cbr\u003epositive and negative.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t4", "label": "Writing Equations using Intercepts", "shape": "dot", "title": "\u003cb\u003eWriting Equations using Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eSince a polynomial function written in factored\u003cbr\u003eform will have a horizontal intercept where each\u003cbr\u003efactor is equal to zero, we can form a function\u003cbr\u003ethat will pass through a set of horizontal\u003cbr\u003eintercepts by introducing a corresponding set of\u003cbr\u003efactors. factored form of polynomials If a\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t5", "label": "Estimating Extrema", "shape": "dot", "title": "\u003cb\u003eEstimating Extrema\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWith quadratics, we were able to algebraically\u003cbr\u003efind the maximum or minimum value of the function\u003cbr\u003eby finding the vertex. For general polynomials,\u003cbr\u003efinding these turning points is not possible\u003cbr\u003ewithout more advanced techniques from calculus.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s4_t1", "label": "Factor Theorem and Remainder Theorem", "shape": "dot", "title": "\u003cb\u003eFactor Theorem and Remainder Theorem\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn the last section, we limited ourselves to\u003cbr\u003efinding the intercepts, or zeros, of polynomials\u003cbr\u003ethat factored simply, or we turned to technology.\u003cbr\u003eIn this section, we will look at algebraic\u003cbr\u003etechniques for finding the zeros of polynomials\u003cbr\u003elike \\(h(t)=t^{3} +4t^{2} +t-6\\).\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s5_t1", "label": "Real Zeros of Polynomials", "shape": "dot", "title": "\u003cb\u003eReal Zeros of Polynomials\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn the last section, we saw how to determine if a\u003cbr\u003ereal number was a zero of a polynomial. In this\u003cbr\u003esection, we will learn how to find good candidates\u003cbr\u003eto test using synthetic division.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s6_t1", "label": "Arithmetic on Complex Numbers", "shape": "dot", "title": "\u003cb\u003eArithmetic on Complex Numbers\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eBefore we dive into the more complicated uses of\u003cbr\u003ecomplex numbers, let\u2019s make sure we remember the\u003cbr\u003ebasic arithmetic involved. To add or subtract\u003cbr\u003ecomplex numbers, we simply add the like terms,\u003cbr\u003ecombining the real parts and combining the\u003cbr\u003eimaginary parts.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s6_t2", "label": "Complex Zeros of Polynomials", "shape": "dot", "title": "\u003cb\u003eComplex Zeros of Polynomials\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eComplex numbers allow us a way to write solutions\u003cbr\u003eto quadratic equations that do not have real\u003cbr\u003esolutions. Exercise \\(\\PageIndex{3}\\) Find the\u003cbr\u003ezeros of \\(f(x)=2x^{2} +3x+4\\).\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s7_t1", "label": "Rational Functions", "shape": "dot", "title": "\u003cb\u003eRational Functions\u003c/b\u003e\u003cbr\u003e\u00a7 7 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the previous sections, we have built\u003cbr\u003epolynomials based on the positive whole number\u003cbr\u003epower functions. In this section, we explore\u003cbr\u003efunctions based on power functions with negative\u003cbr\u003einteger powers, called rational functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s8_t1", "label": "Inverses and Radical Functions", "shape": "dot", "title": "\u003cb\u003eInverses and Radical Functions\u003c/b\u003e\u003cbr\u003e\u00a7 8 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn this section, we will explore the inverses of\u003cbr\u003epolynomial and rational functions, and in\u003cbr\u003eparticular the radical functions that arise in the\u003cbr\u003eprocess. The previous example illustrated two\u003cbr\u003eimportant things: When finding the inverse of a\u003cbr\u003equadratic, we have to limit ourselves to a d\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s1_t1", "label": "Compound Interest", "shape": "dot", "title": "\u003cb\u003eCompound Interest\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIn the bank certificate of deposit (CD) example\u003cbr\u003eearlier in the section, we encountered compound\u003cbr\u003einterest. Typically bank accounts and other\u003cbr\u003esavings instruments in which earnings are\u003cbr\u003ereinvested, such as mutual funds and retirement\u003cbr\u003eaccounts, utilize compound interest.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s1_t2", "label": "A Limit to Compounding", "shape": "dot", "title": "\u003cb\u003eA Limit to Compounding\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eAs we saw earlier, the amount we earn increases as\u003cbr\u003ewe increase the compounding frequency. The table,\u003cbr\u003ethough, shows that the increase from annual to\u003cbr\u003esemi-annual compounding is larger than the\u003cbr\u003eincrease from monthly to daily compounding.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s2_t1", "label": "Graphs of Exponential Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of Exponential Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eLike with linear functions, the graph of an\u003cbr\u003eexponential function is determined by the values\u003cbr\u003efor the parameters in the function\u2019s formula. To\u003cbr\u003eget a sense for the behavior of exponentials, let\u003cbr\u003eus begin by looking more closely at the function\u003cbr\u003e\\(f(x)=2^{x}\\).\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch4_s3_t1", "label": "Logarithmic Functions", "shape": "dot", "title": "\u003cb\u003eLogarithmic Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eA population of 50 flies is expected to double\u003cbr\u003eevery week, leading to a function of the form\u003cbr\u003e\\(f(x)=50(2)^{x}\\), where x represents the number\u003cbr\u003eof weeks that have passed. When will this\u003cbr\u003epopulation reach 500?\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch4_s4_t1", "label": "Logarithmic Properties", "shape": "dot", "title": "\u003cb\u003eLogarithmic Properties\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn the previous section, we derived two important\u003cbr\u003eproperties of logarithms, which allowed us to\u003cbr\u003esolve some basic exponential and logarithmic\u003cbr\u003eequations. properties of logs Inverse Properties:\u003cbr\u003e\\[\\log _{b} \\left(b^{x} \\right)=x\\] \\[b^{\\log _{b}\u003cbr\u003ex} =x\\] Exponential Property: \\[\\log _\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch4_s5_t1", "label": "Graphs of Logarithmic Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of Logarithmic Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eRecall that the exponential function\u003cbr\u003e\\(f(x)=2^{x}\\) produces this table of values \\(x\\)\u003cbr\u003e-3 -2 -1 0 1 2 3 \\(f(x)\\) \\(\\dfrac{1}{8}\\)\u003cbr\u003e\\(\\dfrac{1}{4}\\) \\(\\dfrac{1}{2}\\) 1 2 4 8 Since\u003cbr\u003ethe logarithmic function is an inverse of the\u003cbr\u003eexponential, \\(g(x)=\\log _{2} (x)\\) produces the\u003cbr\u003etable\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch4_s6_t1", "label": "Exponential and Logarithmic Models", "shape": "dot", "title": "\u003cb\u003eExponential and Logarithmic Models\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eWhile we have explored some basic applications of\u003cbr\u003eexponential and logarithmic functions, in this\u003cbr\u003esection we explore some important applications in\u003cbr\u003emore depth. Radioactive Decay In an earlier\u003cbr\u003esection, we discussed radioactive decay \u2013 the idea\u003cbr\u003ethat radioactive isotopes change over\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch4_s7_t1", "label": "Fitting Exponential Models to Data", "shape": "dot", "title": "\u003cb\u003eFitting Exponential Models to Data\u003c/b\u003e\u003cbr\u003e\u00a7 7 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eIn the previous section, we saw number lines using\u003cbr\u003elogarithmic scales. It is also common to see two\u003cbr\u003edimensional graphs with one or both axes using a\u003cbr\u003elogarithmic scale.\u003c/i\u003e"}]);
