677963,0.7405554501299719,0.7696722700233328,0.5498970245207325,0.280252805347606,-0.2639222765782604,-0.3516533343472593,-0.2639222765782604,-0.5246835840551244,-0.2639222765782604,-0.582517289708754,-0.2639222765782604,-0.522531448424328,-0.2639222765782604,-0.8004663588055104,-0.2639222765782604,-0.8047737324258213,-0.2758692359160255,0.12265629285474534,0.4506998959128299,0.24923501742070336,0.6514718750666931,0.24923501742070336,-0.2639222765782604,0.33046904883677963,0.7405554501299719,0.7696722700233328,0.5498970245207325,0.280252805347606],"type":"cone"},{"hoverinfo":"text","hovertext":["\u003cb\u003eWhat is a Function?\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 0\u003cbr\u003e\u003cbr\u003eThe natural world is full of relationships between\u003cbr\u003equantities that change. When we see these\u003cbr\u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent var\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions","\u003cb\u003eFunction Notation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Tables as Functions","\u003cb\u003eTables as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Solving and Evaluating Functions","\u003cb\u003eSolving and Evaluating Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Graphs as Functions","\u003cb\u003eGraphs as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Formulas as Functions","\u003cb\u003eFormulas as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t6\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Basic Toolkit Functions","\u003cb\u003eBasic Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t7\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Notation","\u003cb\u003eNotation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain and Range from Graphs","\u003cb\u003eDomain and Range from Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Piecewise Functions","\u003cb\u003ePiecewise Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 9\u003cbr\u003e\u003cbr\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real nu\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior of Functions","\u003cb\u003eGraphical Behavior of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decrea\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Concavity","\u003cb\u003eConcavity\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["What is a Function?","Function Notation","Tables as Functions","Solving and Evaluating Functions","Graphs as Functions","Formulas as Functions","Basic Toolkit Functions","Notation","Domain and Range from Graphs","Piecewise Functions","Graphical Behavior of Functions","Concavity"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.8136571693556887,5.627314338711377,8.440971508067065,11.254628677422755,14.068285846778444,16.88194301613413,19.69560018548982,22.50925735484551,25.3229145242012,28.13657169355689,30.950228862912574],"y":[0.08034518149753736,0.5527010755488099,0.5368908413679582,0.3632717258111063,0.10090658696384384,-0.1951799020207992,-0.48409762014651975,-1.0,-0.6941312040308526,-0.6521115679044605,-0.5251709085942684,-0.31728081908947137],"z":[0.10244285440258509,-0.12093527425489706,-0.3516533343472593,-0.5246835840551244,-0.582517289708754,-0.522531448424328,-0.8004663588055104,-0.8047737324258213,-0.2758692359160255,0.12265629285474534,0.4506998959128299,0.6514718750666931],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eBehaviors of the Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 12\u003cbr\u003e\u003cbr\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing\u002fDecreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neithe\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs","\u003cb\u003eComposition of Functions using Tables and Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 13\u003cbr\u003e\u003cbr\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition using Formulas","\u003cb\u003eComposition using Formulas\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 14\u003cbr\u003e\u003cbr\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain of Compositions","\u003cb\u003eDomain of Compositions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 15\u003cbr\u003e\u003cbr\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Decomposing Functions","\u003cb\u003eDecomposing Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 16\u003cbr\u003e\u003cbr\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Behaviors of the Toolkit Functions","Composition of Functions using Tables and Graphs","Composition using Formulas","Domain of Compositions","Decomposing Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[33.76388603226826,36.57754320162395,39.39120037097964,42.20485754033533,45.01851470969102],"y":[-0.26526172594531683,0.06083786208759484,0.24821115869955368,0.1879259180162146,0.46745970332243525],"z":[0.24923501742070336,-0.2639222765782604,0.33046904883677963,0.7405554501299719,0.7696722700233328],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eTransformation of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 17\u003cbr\u003e\u003cbr\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Functions","\u003cb\u003eInverse Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi
