 versa. To find coordinates on the circle\u003cbr\u003egiven only the \\(x\\) or \\(y\\) value, we must solve\u003cbr\u003ealgebraically for the unknown values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Circles\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Angles"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["Circles","Points on a Circle"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.5],"y":[-0.7291691703149072,0.014194285434406562],"z":[0.7111978172570692,0.7658986004667143],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eAngles\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eBecause many applications involving circles also\u003cbr\u003einvolve a rotation of the circle, it is natural to\u003cbr\u003eintroduce a measure for the rotation, or angle,\u003cbr\u003ebetween two rays (line segments) emanating from\u003cbr\u003ethe center of a circle. The angle measurement you\u003cbr\u003eare most likel\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on a Circle\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Right Triangle Trigonometry","\u003cb\u003ePoints on Circles Using Sine and Cosine\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\
