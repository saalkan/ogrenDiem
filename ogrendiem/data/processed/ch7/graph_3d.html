a\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Combining Waves of Equal Period","\u003cb\u003eCombining Waves of Equal Period\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eA sinusoidal function of the form \\(f(x)=A\\sin\u003cbr\u003e(Bx+C)\\) can be rewritten using the sum of angles\u003cbr\u003eidentity. Notice that the result is a stretch of\u003cbr\u003ethe sine added to a different stretch of the\u003cbr\u003ecosine, but both have the same horizontal\u003cbr\u003ecompression, which results \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities\u003cbr\u003e  \u00b7 Section 7.2 Addition and Subtraction Identities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Double Angle Identities"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Section 7.2 Addition and Subtraction Identities","Combining Waves of Equal Period"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[2.5,5.0],"y":[0.6336926655501847,0.43508798651171804],"z":[0.7914023053707201,0.09086251136915864],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eDouble Angle Identities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u00
