                  nodes = new vis.DataSet([{"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s1_t1", "label": "Compound Interest", "shape": "dot", "title": "\u003cb\u003eCompound Interest\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIn the bank certificate of deposit (CD) example\u003cbr\u003eearlier in the section, we encountered compound\u003cbr\u003einterest. Typically bank accounts and other\u003cbr\u003esavings instruments in which earnings are\u003cbr\u003ereinvested, such as mutual funds and retirement\u003cbr\u003eaccounts, utilize compound interest.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s1_t2", "label": "A Limit to Compounding", "shape": "dot", "title": "\u003cb\u003eA Limit to Compounding\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eAs we saw earlier, the amount we earn increases as\u003cbr\u003ewe increase the compounding frequency. The table,\u003cbr\u003ethough, shows that the increase from annual to\u003cbr\u003esemi-annual compounding is larger than the\u003cbr\u003eincrease from monthly to daily compounding.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch4_s2_t1", "label": "Graphs of Exponential Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of Exponential Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eLike with linear functions, the graph of an\u003cbr\u003eexponential function is determined by the values\u003cbr\u003efor the parameters in the function\u2019s formula. To\u003cbr\u003eget a sense for the behavior of exponentials, let\u003cbr\u003eus begin by looking more closely at the function\u003cbr\u003e\\(f(x)=2^{x}\\).\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch4_s3_t1", "label": "Logarithmic Functions", "shape": "dot", "title": "\u003cb\u003eLogarithmic Functions\u003c/b\u003e\u00 tial and logarithmic functions, in this\u003cbr\u003esection we explore some important applications in\u003cbr\u003emore depth. Radioactive Decay In an earlier\u003cbr\u003esection, we discussed radioactive decay \u2013 the idea\u003cbr\u003ethat radioactive isotopes change over\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch4_s7_t1", "label": "Fitting Exponential Models to Data", "shape": "dot", "title": "\u003cb\u003eFitting Exponential Models to Data\u003c/b\u003e\u003cbr\u003e\u00a7 7 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eIn the previous section, we saw number lines using\u003cbr\u003elogarithmic scales. It is also common to see two\u003cbr\u003edimensional graphs with one or both axes using a\u003cbr\u003elogarithmic scale.\u003c/i\u003e"}]);
