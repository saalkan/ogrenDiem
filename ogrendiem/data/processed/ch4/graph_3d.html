003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 A Limit to Compounding","\u003cb\u003eA Limit to Compounding\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eAs we saw earlier, the amount we earn increases as\u003cbr\u003ewe increase the compounding frequency. The table,\u003cbr\u003ethough, shows that the increase from annual to\u003cbr\u003esemi-annual compounding is larger than the\u003cbr\u003eincrease from monthly to daily compounding.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Compound Interest\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Graphs of Exponential Functions","\u003cb\u003eGraphs of Exponential Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eLike with linear functions, the graph of an\u003cbr\u003eexponential function is determined by the values\u003cbr\u003efor the parameters in the function\u2019s formula. To\u003cbr\u003eget a sense for the behavior of exponentials, let\u003cbr\u003eus begin by looking more closely at the function\u003cbr\u003e\\(f(x)=2^{x}\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["Compound Interest","A Limit to Compounding","Graphs of Exponential Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.5,5.0],"y":[-0.6072870704952881,-0.21848964390628575,0.2680882437052332],"z":[1.0,0.44370879642179356,0.48884088720208724],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eLogarithmic Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eA population of 50 flies is expected to double\u003cbr\u003eevery week, leading to a function of the form\u003cbr\u003e\\(f(x)=50(2)^{x}\\), where x represents the number\u003cbr\u003eof weeks that have passed. When will this\u003cbr\u003epopulation reach 500?\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e  \u00b7 Graphs of Exponential Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eLogarithmic Properties\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eIn the previous section, we derived two important\u003cbr\u003eproperties of logarithms, which allowed us to\u003cbr\u003esolve some basic exponential and logarithmic\u003cbr\u003eequations. properties of logs Inverse Properties:\u003cbr\u003e\\[\\log _{b} \\left(b^{x} \\right)=x\\] \\[b^{\\log _{b}\u003cbr\u003ex} =x\\] Exponentia\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Logarithmic Functions","Logarithmic Properties"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[7.5,10.0],"y":[0.14186606533823298,0.19637425749396678],"z":[-0.1396386068517379,-0.8335568188690085],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eGraphs of Logarithmic Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eRecall that the exponential function\u003cbr\u003e\\(f(x)=2^{x}\\) produces this table of values \\(x\\)\u003cbr\u003e-3 -2 -1 0 1 2 3 \\(f(x)\\) \\(\\dfrac{1}{8}\\)\u003cbr\u003e\\(\\dfrac{1}{4}\\) \\(\\dfrac{1}{2}\\) 1 2 4 8 Since\u003cbr\u003ethe logarithmic function is an inverse of the\u003cbr\u003eexponential, \\(g(x)=\\log _{2} (x)\\)\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Logarithmic Properties\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models","\u003cb\u003eExponential and Logarithmic Models\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eWhile we have explored some basic applications of\u003cbr\u003eexponential and logarithmic functions, in this\u003cbr\u003esection we explore some important applications in\u003cbr\u003emore depth. Radioactive Decay In an earlier\u003cbr\u003esection, we discussed radioactive decay \u2013 the idea\u003cbr\u003ethat radioactive i\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 A Limit to Compounding\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Graphs of Logarithmic Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Fitting Exponential Models to Data","\u003cb\u003eFitting Exponential Models to Data\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch4_s7_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 7 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eIn the previous section, we saw number lines using\u003cbr\u003elogarithmic scales. It is also common to see two\u003cbr\u003edimensional graphs with one or both axes using a\u003cbr\u003elogarithmic scale.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Logarithmic Functions\u003cbr\u003e  \u00b7 Exponential and Logarithmic Models"],"marker":{"color":"#eb4d4b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"hard","text":["Graphs of Logarithmic Functions","Exponential and Logarithmic Models","Fitting Exponential Models to Data"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[12.5,15.0,17.5],"y":[-0.17401391443573527,-0.13734828266721538,0.5308103449670916],"z":[-0.618064774038119,-0.12067046217683286,-0.2206190216881826],"type":"scatter3d"}],
