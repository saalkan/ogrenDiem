8791737237888,0.90865738074048,0.8930195191065361,0.20457396189415414,-0.6374631169795028,-1.0],"z":[0.018613338030793306,0.9692247327063243,0.41661626196959944,-0.4502669622701305,-0.9775767563464877,-0.7690918433134719,0.018613338030793306],"type":"cone"},{"hoverinfo":"text","hovertext":["\u003cb\u003eSinusoidal Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 0\u003cbr\u003e\u003cbr\u003eThe London Eye (London Eye photo by authors, 2010,\u003cbr\u003eCC-BY) is a huge Ferris wheel 135 meters (394\u003cbr\u003efeet) tall in London, Eng land, which completes\u003cbr\u003eone rotation every 30 minutes. When we look at the\u003cbr\u003ebehavior of this Ferris wheel it is clear that it\u003cbr\u003ecompletes 1 cy\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions","\u003cb\u003eGraphs of the Other Trig Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eIn this section, we will explore the graphs of the\u003cbr\u003eother four trigonometric functions. We\u2019ll begin\u003cbr\u003ewith the tangent function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["Sinusoidal Graphs","Graphs of the Other Trig Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.5],"y":[-0.6089756621340467,0.24018791737237888],"z":[0.7924812292233742,0.9692247327063243],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eInverse Trigonometric Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eIn previous sections, we have evaluated the\u003cbr\u003etrigonometric functions at various angles, but at\u003cbr\u003etimes we need to know what angle would yield a\u003cbr\u003especific sine, cosine, or tangent value. For this,\u003cbr\u003ewe need inverse functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using Known Values"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Inverse Trigonometric Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[5.0],"y":[0.90865738074048],"z":[0.41661626196959944],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eSolving using Known Values\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eIn the last chapter, we learned sine and cosine\u003cbr\u003evalues at commonly encountered angles. We can use\u003cbr\u003ethese to solve sine and cosine equations involving\u003cbr\u003ethese common angles.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions","\u003cb\u003eSolving using the Inverse Trig Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eNot all equations involve the \u201cspecial\u201d values of\u003cbr\u003ethe trig functions to we have learned. To find the\u003cbr\u003esolutions to these equations, we need to use the\u003cbr\u003einverse trig functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using Known Values\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving right triangles for angles","\u003cb\u003eSolving right triangles for angles\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eIn Section 5.5, we used trigonometry on a right\u003cbr\u003etriangle to solve for the sides of a triangle\u003cbr\u003egiven one side and an additional angle. Using the\u003cbr\u003einverse trig functions, we can solve for the\u003cbr\u003eangles of a right triangle given two sides.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions","\u003cb\u003eModeling with sinusoidal functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s5_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eMany modeling situations involve functions that\u003cbr\u003eare periodic. Previously we learned that\u003cbr\u003esinusoidal functions are a special type of\u003cbr\u003eperiodic function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e  \u00b7 Solving right triangles for angles"],"marker":{"color":"#eb4d4b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"hard","text":["Solving using Known Values","Solving using the Inverse Trig Functions","Solving right triangles for angles","Modeling with sinusoidal functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[7.5,10.0,12.5,15.0],"y":[0.8930195191065361,0.20457396189415414,-0.6374631169795028,-1.0],"z":[-0.4502669622701305,-0.9775767563464877,-0.7690918433134719,0.018613338030793306],"type":"scatter3d"}],                        {"template":{"data":{"histogram2dcontour":[{"type":"histogram2dcontour","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"],[0.1111111111111111,"#46039f"],[0.2222222222222222,"#7201a8"],[0.3333333333333333,"#9c179e"],[0.4444444444444444,"#bd3786"],[0.5555555555555556,"#d8576b"],[0.6666666666666666,"#ed7953"],[0.7777777777777778,"#fb9f3a"],[0.8888888888888888,"#fdca26"],[1.0,"#f0f921"]]}],"choropleth":[{"type":"choropleth","colorbar":{"outlinewidth":0,"ticks":""}}],"histogram2d":[{"type":"histogram2d","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"],[0.1111111111111111,"#46039f"],[0.2222222222222222,"#7201a8"],[0.3333333333333333,"#9c179e"],[0.4444444444444444,"#bd3786
