s","\u003cb\u003ePolar Coordinates\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eThe coordinate system we are most familiar with is\u003cbr\u003ecalled the Cartesian coordinate system, a\u003cbr\u003erectangular plane divided into four quadrants by\u003cbr\u003ehorizontal and vertical axes. In earlier chapters,\u003cbr\u003ewe often found the Cartesian coordinates of a\u003cbr\u003epoint on a circle at \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Law of Cosines\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["Law of Sines","Law of Cosines","Polar Coordinates"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.5,5.0],"y":[-0.23905638490169626,-0.15401882582350646,-0.05145252120047775],"z":[1.0,0.6443042875061218,0.2152624769900858],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003ePolar Form of Complex Numbers\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eFrom previous classes, you may have encountered\u003cbr\u003e\u201cimaginary numbers\u201d \u2013 the square roots of negative\u003cbr\u003enumbers \u2013 and, more generally, complex numbers\u003cbr\u003ewhich are the sum of a real number and an\u003cbr\u003eimaginary number. While these are useful for\u003cbr\u003eexpressing the solutions to\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polar Coordinates\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Vectors\u003cbr\u003e  \u00b7 Dot Product\u003cbr\u003e  \u00b7 Parametric Equations"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Polar Form of Complex Numbers"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[7.5],"y":[0.062013769926982265],"z":[-0.2594047189809138],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eVectors\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eA woman leaves home, walks 3 miles north, then 2\u003cbr\u003emiles southeast. How far is she from home, and in\u003cbr\u003ewhich direction would she need to walk to return\u003cbr\u003ehome?\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Dot Product","\u003cb\u003eDot Product\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eNow that we can add, subtract, and scale vectors,\u003cbr\u003eyou might be wondering whether we can multiply\u003cbr\u003evectors. It turns out there are two different ways\u003cbr\u003eto multiply vectors, one which results in a\u003cbr\u003enumber, and one which results in a vector.\
