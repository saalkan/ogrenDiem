              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t1", "label": "What is a Function?", "shape": "dot", "title": "\u003cb\u003eWhat is a Function?\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eThe natural world is full of relationships between\u003cbr\u003equantities that change. When we see these\u003cbr\u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent variable, and a corresp\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t2", "label": "Function Notation", "shape": "dot", "title": "\u003cb\u003eFunction Notation\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t3", "label": "Tables as Functions", "shape": "dot", "title": "\u003cb\u003eTables as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t4", "label": "Solving and Evaluating Functions", "shape": "dot", "title": "\u003cb\u003eSolving and Evaluating Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t5", "label": "Graphs as Functions", "shape": "dot", "title": "\u003cb\u003eGraphs as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t6", "label": "Formulas as Functions", "shape": "dot", "title": "\u003cb\u003eFormulas as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t7", "label": "Basic Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBasic Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t1", "label": "Notation", "shape": "dot", "title": "\u003cb\u003eNotation\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t2", "label": "Domain and Range from Graphs", "shape": "dot", "title": "\u003cb\u003eDomain and Range from Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t3", "label": "Piecewise Functions", "shape": "dot", "title": "\u003cb\u003ePiecewise Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real number value regardles\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t1", "label": "Graphical Behavior of Functions", "shape": "dot", "title": "\u003cb\u003eGraphical Behavior of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decreasing at \\(t =\\) 1, 3\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t2", "label": "Concavity", "shape": "dot", "title": "\u003cb\u003eConcavity\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t3", "label": "Behaviors of the Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBehaviors of the Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing/Decreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neither concave up nor dow\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t1", "label": "Composition of Functions using Tables and Graphs", "shape": "dot", "title": "\u003cb\u003eComposition of Functions using Tables and Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t2", "label": "Composition using Formulas", "shape": "dot", "title": "\u003cb\u003eComposition using Formulas\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as the input to the ou\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t3", "label": "Domain of Compositions", "shape": "dot", "title": "\u003cb\u003eDomain of Compositions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were undefined at a valu\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t4", "label": "Decomposing Functions", "shape": "dot", "title": "\u003cb\u003eDecomposing Functions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s5_t1", "label": "Transformation of Functions", "shape": "dot", "title": "\u003cb\u003eTransformation of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s6_t1", "label": "Inverse Functions", "shape": "dot", "title": "\u003cb\u003eInverse Functions\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eA fashion designer is travelling to Milan for a\u003cbr\u003efashion show. He asks his assistant, Betty, what\u003cbr\u003e75 degrees Fahrenheit is in Celsius, and after a\u003cbr\u003equick search on Google, she finds the formula\u003cbr\u003e\\(C=\\dfrac{5}{9} (F-32)\\).\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch5_s1_t1", "label": "Circles", "shape": "dot", "title": "\u003cb\u003eCircles\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIf we wanted to find an equation to represent a\u003cbr\u003ecircle with a radius of \\(r\\) centered at a point\u003cbr\u003e(\\(h\\), \\(k\\)), we notice that the distance\u003cbr\u003ebetween any point (\\(x\\), \\(y\\)) on the circle and\u003cbr\u003ethe center point is always the same: \\(r\\). Noting\u003cbr\u003ethis, we can use our distance formul\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch5_s1_t2", "label": "Points on a Circle", "shape": "dot", "title": "\u003cb\u003ePoints on a Circle\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eAs noted earlier, an equation for a circle cannot\u003cbr\u003ebe written so that \\(y\\) is a function of \\(x\\) or\u003cbr\u003evice versa. To find coordinates on the circle\u003cbr\u003egiven only the \\(x\\) or \\(y\\) value, we must solve\u003cbr\u003ealgebraically for the unknown values.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch5_s2_t1", "label": "Angles", "shape": "dot", "title": "\u003cb\u003eAngles\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eBecause many applications involving circles also\u003cbr\u003einvolve a rotation of the circle, it is natural to\u003cbr\u003eintroduce a measure for the rotation, or angle,\u003cbr\u003ebetween two rays (line segments) emanating from\u003cbr\u003ethe center of a circle. The angle measurement you\u003cbr\u003eare most likely familiar with is d\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch5_s3_t1", "label": "Points on Circles Using Sine and Cosine", "shape": "dot", "title": "\u003cb\u003ePoints on Circles Using Sine and Cosine\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhile it is convenient to describe the location of\u003cbr\u003ea point on a circle using an angle or a distance\u003cbr\u003ealong the circle, relating this information to the\u003cbr\u003ex and y coordinates and the circle equation we\u003cbr\u003eexplored in Section 5.1 is an important\u003cbr\u003eapplication of trigonometry. A distress si\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch5_s4_t1", "label": "The Other Trigonometric Functions", "shape": "dot", "title": "\u003cb\u003eThe Other Trigonometric Functions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the previous section, we defined the sine and\u003cbr\u003ecosine functions as ratios of the sides of a right\u003cbr\u003etriangle in a circle. Since the triangle has 3\u003cbr\u003esides there are 6 possible combinations of ratios.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch5_s5_t1", "label": "Right Triangle Trigonometry", "shape": "dot", "title": "\u003cb\u003eRight Triangle Trigonometry\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eIn Section 5.3 we were introduced to the sine and\u003cbr\u003ecosine function as ratios of the sides of a\u003cbr\u003etriangle drawn inside a circle, and spent the rest\u003cbr\u003eof that section discussing the role of those\u003cbr\u003efunctions in finding points on the circle. In this\u003cbr\u003esection, we return to the triangle, and\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch6_s1_t1", "label": "Sinusoidal Graphs", "shape": "dot", "title": "\u003cb\u003eSinusoidal Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe London Eye (London Eye photo by authors, 2010,\u003cbr\u003eCC-BY) is a huge Ferris wheel 135 meters (394\u003cbr\u003efeet) tall in London, Eng land, which completes\u003cbr\u003eone rotation every 30 minutes. When we look at the\u003cbr\u003ebehavior of this Ferris wheel it is clear that it\u003cbr\u003ecompletes 1 cycle, or 1 revolution\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch6_s2_t1", "label": "Graphs of the Other Trig Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of the Other Trig Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn this section, we will explore the graphs of the\u003cbr\u003eother four trigonometric functions. We\u2019ll begin\u003cbr\u003ewith the tangent function.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch6_s3_t1", "label": "Inverse Trigonometric Functions", "shape": "dot", "title": "\u003cb\u003eInverse Trigonometric Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn previous sections, we have evaluated the\u003cbr\u003etrigonometric functions at various angles, but at\u003cbr\u003etimes we need to know what angle would yield a\u003cbr\u003especific sine, cosine, or tangent value. For this,\u003cbr\u003ewe need inverse functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch6_s4_t1", "label": "Solving using Known Values", "shape": "dot", "title": "\u003cb\u003eSolving using Known Values\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the last chapter, we learned sine and cosine\u003cbr\u003evalues at commonly encountered angles. We can use\u003cbr\u003ethese to solve sine and cosine equations involving\u003cbr\u003ethese common angles.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch6_s4_t2", "label": "Solving using the Inverse Trig Functions", "shape": "dot", "title": "\u003cb\u003eSolving using the Inverse Trig Functions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eNot all equations involve the \u201cspecial\u201d values of\u003cbr\u003ethe trig functions to we have learned. To find the\u003cbr\u003esolutions to these equations, we need to use the\u003cbr\u003einverse trig functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch6_s5_t1", "label": "Solving right triangles for angles", "shape": "dot", "title": "\u003cb\u003eSolving right triangles for angles\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn Section 5.5, we used trigonometry on a right\u003cbr\u003etriangle to solve for the sides of a triangle\u003cbr\u003egiven one side and an additional angle. Using the\u003cbr\u003einverse trig functions, we can solve for the\u003cbr\u003eangles of a right triangle given two sides.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch6_s5_t2", "label": "Modeling with sinusoidal functions", "shape": "dot", "title": "\u003cb\u003eModeling with sinusoidal functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eMany modeling situations involve functions that\u003cbr\u003eare periodic. Previously we learned that\u003cbr\u003esinusoidal functions are a special type of\u003cbr\u003eperiodic function.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch7_s1_t1", "label": "Solving Trigonometric
