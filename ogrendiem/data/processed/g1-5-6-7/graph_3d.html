 and Range from Graphs\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Circles\u003cbr\u003e  \u00b7 Points on a Circle\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions\u003cbr\u003e  \u00b7 Solving using Known Values\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities\u003cbr\u003e  \u00b7 Combining Waves of Equal Period\u003cbr\u003e  \u00b7 Modeling Changing Amplitude and Midline","\u003cb\u003eFunction Notation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Tables as Functions","\u003cb\u003eTables as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Solving and Evaluating Functions","\u003cb\u003eSolving and Evaluating Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Graphs as Functions","\u003cb\u003eGraphs as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Formulas as Functions","\u003cb\u003eFormulas as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t6\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Basic Toolkit Functions","\u003cb\u003eBasic Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t7\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Notation","\u003cb\u003eNotation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain and Range from Graphs","\u003cb\u003eDomain and Range from Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Piecewise Functions","\u003cb\u003ePiecewise Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 9\u003cbr\u003e\u003cbr\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real nu\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior of Functions","\u003cb\u003eGraphical Behavior of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decrea\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Concavity","\u003cb\u003eConcavity\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions","\u003cb\u003eCircles\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 19\u003cbr\u003e\u003cbr\u003eIf we wanted to find an equation to represent a\u003cbr\u003ecircle with a radius of \\(r\\) centered at a point\u003cbr\u003e(\\(h\\), \\(k\\)), we notice that the distance\u003cbr\u003ebetween any point (\\(x\\), \\(y\\)) on the circle and\u003cbr\u003ethe center point is always the same: \\(r\\). Noting\u003cbr\u003ethis, we can use\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Points on a Circle","\u003cb\u003ePoints on a Circle\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 20\u003cbr\u003e\u003cbr\u003eAs noted earlier, an equation for a circle cannot\u003cbr\u003ebe written so that \\(y\\) is a function of \\(x\\) or\u003cbr\u003evice versa. To find coordinates on the circle\u003cbr\u003egiven only the \\(x\\) or \\(y\\) value, we must solve\u003cbr\u003ealgebraically for the unknown values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Circles\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Angles","\u003cb\u003eSinusoidal Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 25\u003cbr\u003e\u003cbr\u003eThe London Eye (London Eye photo by authors, 2010,\u003cbr\u003eCC-BY) is a huge Ferris wheel 135 meters (394\u003cbr\u003efeet) tall in London, Eng land, which completes\u003cbr\u003eone rotation every 30 minutes. When we look at the\u003cbr\u003ebehavior of this Ferris wheel it is clear that it\u003cbr\u003ecompletes 1 cy\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions\u003cbr\u003e  \u00b7 Modeling Changing Amplitude and Midline\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions","\u003cb\u003eGraphs of the Other Trig Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 26\u003cbr\u003e\u003cbr\u003eIn this section, we will explore the graphs of the\u003cbr\u003eother four trigonometric functions. We\u2019ll begin\u003cbr\u003ewith the tangent function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions","\u003cb\u003eSolving Trigonometric Equations with Identities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 32\u003cbr\u003e\u003cbr\u003eIn the last chapter, we solved basic trigonometric\u003cbr\u003eequations. In this section, we explore the\u003cbr\u003etechniques needed to solve more complicated trig\u003cbr\u003eequations.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Section 7.2 Addition and Subtraction Identities\u003cbr\u003e  \u00b7 Combining Waves of Equal Period\u003cbr\u003 \u002fi\u003e 12\u003cbr\u003e\u003cbr\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing\u002fDecreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neithe\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs","\u003cb\u003eComposition of Functions using Tables and Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 13\u003cbr\u003e\u003cbr\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition using Formulas","\u003cb\u003eComposition using Formulas\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 14\u003cbr\u003e\u003cbr\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain of Compositions","\u003cb\u003eDomain of Compositions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 15\u003cbr\u003e\u003cbr\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Decomposing Functions","\u003cb\u003eDecomposing Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 16\u003cbr\u003e\u003cbr\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions","\u003cb\u003eAngles\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 21\u003cbr\u003e\u003cbr\u003eBecause many applications involving circles also\u003cbr\u003einvolve a rotation of the circle, it is natural to\u003cbr\u003eintroduce a measure for the rotation, or angle,\u003cbr\u003ebetween two rays (line segments) emanating from\u003cbr\u003ethe center of a circle. The angle measurement you\u003cbr\u003eare most likel\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Points on a Circle\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e  \u00b7 Solving right triangles for angles\u003cbr\u003e  \u00b7 Section 7.2 Addition and Subtraction Identities","\u003cb\u003ePoints on Circles Using Sine and Cosine\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 22\u003cbr\u003e\u003cbr\u003eWhile it is convenient to describe the location of\u003cbr\u003ea point on a circle using an angle or a distance\u003cbr\u003ealong the circle, relating this information to the\u003cbr\u003ex and y coordinates and the circle equation we\u003cbr\u003eexplored in Section 5.1 is an important\u003cbr\u003eapplication of trigono\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Circles\u003cbr\u003e  \u00b7 Points on a Circle\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e  \u00b7 The Other Trigonometric Functions","\u003cb\u003eInverse Trigonometric Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 27\u003cbr\u003e\u003cbr\u003eIn previous sections, we have evaluated the\u003cbr\u003etrigonometric functions at various angles, but at\u003cbr\u003etimes we need to know what angle would yield a\u003cbr\u003especific sine, cosine, or tangent value. For this,\u003cbr\u003ewe need inverse functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using Known Values","\u003cb\u003eSection 7.2 Addition and Subtraction Identities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 33\u003cbr\u003e\u003cbr\u003eIn this section, we begin expanding our repertoire\u003cbr\u003eof trigonometric identities. The sum and\u003cbr\u003edifference identities \\[\\cos (\\alpha -\\beta )=\\cos\u003cbr\u003e(\\alpha )\\cos (\\beta )+\\sin (\\alpha )\\sin (\\beta\u003cbr\u003e)\\] \\[\\cos (\\alpha +\\beta )=\\cos (\\alpha )\\cos\u003cbr\u003e(\\beta )-\\sin (\\alpha\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Combining Waves of Equal Period","\u003cb\u003eCombining Waves of Equal Period\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 34\u003cbr\u003e\u003cbr\u003eA sinusoidal function of the form \\(f(x)=A\\sin\u003cbr\u003e(Bx+C)\\) can be rewritten using the sum of angles\u003cbr\u003eidentity. Notice that the result is a stretch of\u003cbr\u003ethe sine added to a different stretch of the\u003cbr\u003ecosine, but both have the same horizontal\u003cbr\u003ecompression, which results \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities\u003cbr\u003e  \u00b7 Section 7.2 Addition and Subtraction Identities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Double Angle Identities"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Behaviors of the Toolkit Functions","Composition of Functions using Tables and Graphs","Composition using Formulas","Domain of Compositions","Decomposing Functions","Angles","Points on Circles Using Sine and Cosine","Inverse Trigonometric Functions","Section 7.2 Addition and Subtraction Identities","Combining Waves of Equal Period"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[47.11687595755899,51.04328228735557,54.96968861715215,58.89609494694873,62.822501276745314,82.45453292572823,86.38093925552481,106.01297090450771,129.5714088832872,133.49781521308378],"y":[-0.2930039728199296,-0.5529119456126668,-0.44260020689446605,-0.30712093647373023,-0.08287904555862419,0.528336602656559,0.42974961022448843,0.20784409212730517,0.5724783992116415,0.2225897806641826],"z":[0.3280779477399725,0.08973692391932835,-0.258831339091648,-0.4117875470315324,-0.32835223669825103,-0.15197006901044988,0.2030688160373019,0.24755690134758668,-0.6047154012092132,-0.4894562309910678],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eTransformation of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 17\u003cbr\u003e\u003cbr\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Circles\u003cbr\u003e  \u00b7 Points on a Circle\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e  \u00b7 Graphs of the Other Trig Functions\u003cbr\u003e  \u00b7 Combining Waves of Equal Period","\u003cb\u003eInverse Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 18\u003cbr\u003e\u003cbr\u003eA fashion designer is travelling to Milan for a\u003cbr\u003efashion show. He asks his assistant, Betty, what\u003cbr\u003e75 degrees Fahrenheit is in Celsius, and after a\u003cbr\u003equick search on Google, she finds the formula\u003cbr\u003e\\(C=\\dfrac{5}{9} (F-32)\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e  \u00b7 Solving right triangles for angles\u003cbr\u003e  \u00b7 Circles","\u003cb\u003eThe Other Trigonometric Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 23\u003cbr\u003e\u003cbr\u003eIn the previous section, we defined the sine and\u003cbr\u003ecosine functions as ratios of the sides of a right\u003cbr\u003etriangle in a circle. Since the triangle has 3\u003cbr\u003esides there are 6 possible combinations of ratios.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Right Triangle Trigonometry","\u003cb\u003eRight Triangle Trigonometry\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch5_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 24\u003cbr\u003e\u003cbr\u003eIn Section 5.3 we were introduced to the sine and\u003cbr\u003ecosine function as ratios of the sides of a\u003cbr\u003etriangle drawn inside a circle, and spent the rest\u003cbr\u003eof that section discussing the role of those\u003cbr\u003efunctions in finding points on the circle. In this\u003cbr\u003esection, we return \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 The Other Trigonometric Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions\u003cbr\u003e  \u00b7 Solving right triangles for angles\u003cbr\u003e  \u00b7 Sinusoidal Graphs","\u003cb\u003eSolving using Known Values\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 28\u003cbr\u003e\u003cbr\u003eIn the last chapter, we learned sine and cosine\u003cbr\u003evalues at commonly encountered angles. We can use\u003cbr\u003ethese to solve sine and cosine equations involving\u003cbr\u003ethese common angles.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Trigonometric Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions","\u003cb\u003eSolving using the Inverse Trig Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 29\u003cbr\u003e\u003cbr\u003eNot all equations involve the \u201cspecial\u201d values of\u003cbr\u003ethe trig functions to we have learned. To find the\u003cbr\u003esolutions to these equations, we need to use the\u003cbr\u003einverse trig functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Points on Circles Using Sine and Cosine\u003cbr\u003e  \u00b7 Solving using Known Values\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving right triangles for angles","\u003cb\u003eSolving right triangles for angles\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 30\u003cbr\u003e\u003cbr\u003eIn Section 5.5, we used trigonometry on a right\u003cbr\u003etriangle to solve for the sides of a triangle\u003cbr\u003egiven one side and an additional angle. Using the\u003cbr\u003einverse trig functions, we can solve for the\u003cbr\u003eangles of a right triangle given two sides.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Angles\u003cbr\u003e  \u00b7 Right Triangle Trigonometry\u003cbr\u003e  \u00b7 Solving using the Inverse Trig Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with sinusoidal functions","\u003cb\u003eModeling with sinusoidal functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch6_s5_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 31\u003cbr\u003e\u003cbr\u003eMany modeling situations involve functions that\u003cbr\u003eare periodic. Previously we learned that\u003cbr\u003esinusoidal functions are a special type of\u003cbr\u003eperiodic function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Sinusoidal Graphs\u003cbr\u003e  \u00b7 Solving right triangles for angles\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Trigonometric Equations with Identities","\u003cb\u003eDouble Angle Identities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch7_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 35\u003cbr\u003e\u003cbr\u003eTwo special cases of the sum of angles identities\u003cbr\u003earise often enough that we choose to state these\u003cbr\u003eidentities separately. IDENTITIES The double angle\u003cbr\u003eidentities \\[\\sin (2\\alpha )=2\\sin (\\alpha )\\cos\u003cbr\u003e(\\alpha )\\] \\[\\begin{array
