              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t1", "label": "What is a Function?", "shape": "dot", "title": "\u003cb\u003eWhat is a Function?\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eThe natural world is full of relationships between\u003cbr\u003equantities that change. When we see these\u003cbr\u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent variable, and a corresp\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t2", "label": "Function Notation", "shape": "dot", "title": "\u003cb\u003eFunction Notation\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t3", "label": "Tables as Functions", "shape": "dot", "title": "\u003cb\u003eTables as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t4", "label": "Solving and Evaluating Functions", "shape": "dot", "title": "\u003cb\u003eSolving and Evaluating Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t5", "label": "Graphs as Functions", "shape": "dot", "title": "\u003cb\u003eGraphs as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t6", "label": "Formulas as Functions", "shape": "dot", "title": "\u003cb\u003eFormulas as Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s1_t7", "label": "Basic Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBasic Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t1", "label": "Notation", "shape": "dot", "title": "\u003cb\u003eNotation\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t2", "label": "Domain and Range from Graphs", "shape": "dot", "title": "\u003cb\u003eDomain and Range from Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s2_t3", "label": "Piecewise Functions", "shape": "dot", "title": "\u003cb\u003ePiecewise Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real number value regardles\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t1", "label": "Graphical Behavior of Functions", "shape": "dot", "title": "\u003cb\u003eGraphical Behavior of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decreasing at \\(t =\\) 1, 3\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t2", "label": "Concavity", "shape": "dot", "title": "\u003cb\u003eConcavity\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s3_t3", "label": "Behaviors of the Toolkit Functions", "shape": "dot", "title": "\u003cb\u003eBehaviors of the Toolkit Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing/Decreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neither concave up nor dow\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t1", "label": "Composition of Functions using Tables and Graphs", "shape": "dot", "title": "\u003cb\u003eComposition of Functions using Tables and Graphs\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t2", "label": "Composition using Formulas", "shape": "dot", "title": "\u003cb\u003eComposition using Formulas\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as the input to the ou\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t3", "label": "Domain of Compositions", "shape": "dot", "title": "\u003cb\u003eDomain of Compositions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were undefined at a valu\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch1_s4_t4", "label": "Decomposing Functions", "shape": "dot", "title": "\u003cb\u003eDecomposing Functions\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s5_t1", "label": "Transformation of Functions", "shape": "dot", "title": "\u003cb\u003eTransformation of Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eOften when given a problem, we try to model the\u003cbr\u003escenario using mathematics in the form of words,\u003cbr\u003etables, graphs and equations in order to explain\u003cbr\u003eor solve it. When building models, it is often\u003cbr\u003ehelpful to build off of existing formulas or\u003cbr\u003emodels.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch1_s6_t1", "label": "Inverse Functions", "shape": "dot", "title": "\u003cb\u003eInverse Functions\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eA fashion designer is travelling to Milan for a\u003cbr\u003efashion show. He asks his assistant, Betty, what\u003cbr\u003e75 degrees Fahrenheit is in Celsius, and after a\u003cbr\u003equick search on Google, she finds the formula\u003cbr\u003e\\(C=\\dfrac{5}{9} (F-32)\\).\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t1", "label": "Characteristics of Power Functions", "shape": "dot", "title": "\u003cb\u003eCharacteristics of Power Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eShown to the right are the graphs of\u003cbr\u003e\\(f(x)=x^{2}\\), \\(f(x)=x^{4}\\), and\u003cbr\u003e\\(f(x)=x^{6}\\), all even whole number powers.\u003cbr\u003eNotice that all these graphs have a fairly similar\u003cbr\u003eshape, very similar to the quadratic toolkit, but\u003cbr\u003eas the power increases the graphs flatten somewhat\u003cbr\u003enear the\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t2", "label": "Polynomials", "shape": "dot", "title": "\u003cb\u003ePolynomials\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eAn oil pipeline bursts in the Gulf of Mexico,\u003cbr\u003ecausing an oil slick in a roughly circular shape.\u003cbr\u003eThe slick is currently 24 miles in radius, but\u003cbr\u003ethat radius is increasing by 8 miles each week.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s1_t3", "label": "Short Run Behavior", "shape": "dot", "title": "\u003cb\u003eShort Run Behavior\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eCharacteristics of the graph such as vertical and\u003cbr\u003ehorizontal intercepts and the places the graph\u003cbr\u003echanges direction are part of the short run\u003cbr\u003ebehavior of the polynomial. Like with all\u003cbr\u003efunctions, the vertical intercept is where the\u003cbr\u003egraph crosses the vertical axis, and occurs when t\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s2_t1", "label": "Short run Behavior: Vertex", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Vertex\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWe now explore the interesting features of the\u003cbr\u003egraphs of quadratics. In addition to intercepts,\u003cbr\u003equadratics have an interesting feature where they\u003cbr\u003echange direction, called the vertex .\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s2_t2", "label": "Short run Behavior: Intercepts", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs with any function, we can find the vertical\u003cbr\u003eintercepts of a quadratic by evaluating the\u003cbr\u003efunction at an input of zero, and we can find the\u003cbr\u003ehorizontal intercepts by solving for when the\u003cbr\u003eoutput will be zero. Notice that depending upon\u003cbr\u003ethe location of the graph, we might have zero\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t1", "label": "Short run Behavior: Intercepts", "shape": "dot", "title": "\u003cb\u003eShort run Behavior: Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs with any function, the vertical intercept can\u003cbr\u003ebe found by evaluating the function at an input of\u003cbr\u003ezero. Since this is evaluation, it is relatively\u003cbr\u003eeasy to do it for a polynomial of any degree.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t2", "label": "Graphical Behavior at Intercepts", "shape": "dot", "title": "\u003cb\u003eGraphical Behavior at Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIf we graph the function \\(f(x)=(x+3)(x-2)^{2}\u003cbr\u003e(x+1)^{3}\\), notice that the behavior at each of\u003cbr\u003ethe horizontal intercepts is different. At the\u003cbr\u003ehorizontal intercept x = -3, coming from the\u003cbr\u003e\\((x+3)\\) factor of the polynomial, the graph\u003cbr\u003epasses directly through the horizontal interce\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t3", "label": "Solving Polynomial Inequalities", "shape": "dot", "title": "\u003cb\u003eSolving Polynomial Inequalities\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eOne application of our ability to find intercepts\u003cbr\u003eand sketch a graph of polynomials is the ability\u003cbr\u003eto solve polynomial inequalities. It is a very\u003cbr\u003ecommon question to ask when a function will be\u003cbr\u003epositive and negative.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t4", "label": "Writing Equations using Intercepts", "shape": "dot", "title": "\u003cb\u003eWriting Equations using Intercepts\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eSince a polynomial function written in factored\u003cbr\u003eform will have a horizontal intercept where each\u003cbr\u003efactor is equal to zero, we can form a function\u003cbr\u003ethat will pass through a set of horizontal\u003cbr\u003eintercepts by introducing a corresponding set of\u003cbr\u003efactors. factored form of polynomials If a\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch3_s3_t5", "label": "Estimating Extrema", "shape": "dot", "title": "\u003cb\u003eEstimating Extrema\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eWith quadratics, we were able to algebraically\u003cbr\u003efind the maximum or minimum value of the function\u003cbr\u003eby finding the vertex. For general polynomials,\u003cbr\u003efinding these turning points is not possible\u003cbr\u003ewithout more advanced techniques from calculus.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s4_t1", "label": "Factor Theorem and Remainder Theorem", "shape": "dot", "title": "\u003cb\u003eFactor Theorem and Remainder Theorem\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn the last section, we limited ourselves to\u003cbr\u003efinding the intercepts, or zeros, of polynomials\u003cbr\u003ethat factored simply, or we turned to technology.\u003cbr\u003eIn this section, we will look at algebraic\u003cbr\u003etechniques for finding the zeros of polynomials\u003cbr\u003elike \\(h(t)=t^{3} +4t^{2} +t-6\\).\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch3_s5_t1", "label": "Real Zeros of Polynomials", "shape": "dot", "title": "\u003cb\u003eReal Zeros of Polynomials\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn the last section, we saw how to determine if a\u003cbr\u003ereal number was a zero of a polynomial. In this\u003cbr\u003esection, we will learn how to find good candidates\u003cbr\u003eto test using synthetic division.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s6_t1", "label": "Arithmetic on Complex Numbers", "shape": "dot", "title": "\u003cb\u003eArithmetic on Complex Numbers\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eBefore we dive into the more complicated uses of\u003cbr\u003ecomplex numbers, let\u2019s make sure we remember the\u003cbr\u003ebasic arithmetic involved. To add or subtract\u003cbr\u003ecomplex numbers, we simply add the like terms,\u003cbr\u003ecombining the real parts and combining the\u003cbr\u003eimaginary parts.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s6_t2", "label": "Complex Zeros of Polynomials", "shape": "dot", "title": "\u003cb\u003eComplex Zeros of Polynomials\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eComplex numbers allow us a way to write solutions\u003cbr\u003eto quadratic equations that do not have real\u003cbr\u003esolutions. Exercise \\(\\PageIndex{3}\\) Find the\u003cbr\u003ezeros of \\(f(x)=2x^{2} +3x+4\\).\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s7_t1", "label": "Rational Functions", "shape": "dot", "title": "\u003cb\u003eRational Functions\u003c/b\u003e\u003cbr\u003e\u00a7 7 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the previous sections, we have built\u003cbr\u003epolynomials based on the positive whole number\u003cbr\u003epower functions. In this section, we explore\u003cbr\u003efunctions based on power functions with negative\u003cbr\u003einteger powers, called rational functions.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch3_s8_t1", "label": "Inverses and Radical Functions", "shape": "dot", "title": "\u003cb\u003eInverses and Radical Functions\u003c/b\u003e\u003cbr\u003e\u00a7 8 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn this section, we will explore the inverses of\u003cbr\u003epolynomial and rational functions, and in\u003cbr\u003eparticular the radical functions that arise in the\u003cbr\u003eprocess. The previous example illustrated two\u003cbr\u003eimportant things: When finding the inverse of a\u003cbr\u003equadratic, we have to limit ourselves to a d\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch8_s1_t1", "label": "Law of Sines", "shape": "dot", "title": "\u003cb\u003eLaw of Sines\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eGiven an arbitrary non-right triangle, we can drop\u003cbr\u003ean altitude, which we temporarily label \\(h\\), to\u003cbr\u003ecreate two right triangles. Using the right\u003cbr\u003etriangle relationships, \\[\\sin (\\alpha ) =\u003cbr\u003e\\dfrac{h}{b}\\text{ and }\\sin (\\beta ) =\u003cbr\u003e\\dfrac{h}{a}\\nonumber\\] Solving both equations for\u003cbr\u003e\\\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch8_s1_t2", "label": "Law of Cosines", "shape": "dot", "title": "\u003cb\u003eLaw of Cosines\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eSuppose a boat leaves port, travels 10 miles,\u003cbr\u003eturns 20 degrees, and travels another 8 miles. How\u003cbr\u003efar from port is the boat?\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch8_s2_t1", "label": "Polar Coordinates", "shape": "dot", "title": "\u003cb\u003ePolar Coordinates\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe coordinate system we are most familiar with is\u003cbr\u003ecalled the Cartesian coordinate system, a\u003cbr\u003erectangular plane divided into four quadrants by\u003cbr\u003ehorizontal and vertical axes. In earlier chapters,\u003cbr\u003ewe often found the Cartesian coordinates of a\u003cbr\u003epoint on a circle at a given angle from t\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch8_s3_t1", "label": "Polar Form of Complex Numbers", "shape": "dot", "title": "\u003cb\u003ePolar Form of Complex Numbers\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eFrom previous classes, you may have encountered\u003cbr\u003e\u201cimaginary numbers\u201d \u2013 the square roots of negative\u003cbr\u003enumbers \u2013 and, more generally, complex numbers\u003cbr\u003ewhich are the sum of a real number and an\u003cbr\u003eimaginary number. While these are useful for\u003cbr\u003eexpressing the solutions to quadratic equations\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch8_s4_t1", "label": "Vectors", "shape": "dot", "title": "\u003cb\u003eVectors\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eA woman leaves home, walks 3 miles north, then 2\u003cbr\u003emiles southeast. How far is she from home, and in\u003cbr\u003ewhich direction would she need to walk to return\u003cbr\u003ehome?\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch8_s5_t1", "label": "Dot Product", "shape": "dot", "title": "\u003cb\u003eDot Product\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eNow that we can add, subtract, and scale vectors,\u003cbr\u003eyou might be wondering whether we can multiply\u003cbr\u003evectors. It turns out there are two different ways\u003cbr\u003eto multiply vectors, one which results in a\u003cbr\u003enumber, and one which results in a vector.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch8_s6_t1", "label": "Parametric Equations", "shape": "dot", "title": "\u003cb\u003eParametric Equations\u003c/b\u003e\u003cbr\u003e\u00a7 6 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eMany shapes, even ones as simple as circles,\u003cbr\u003ecannot be represented as an equation where \\(y\\)\u003cbr\u003eis a function of \\(x\\). Consider, for example, the\u003cbr\u003epath a moon follows as it orbits around a planet,\u003cbr\u003ewhich simultaneously rotates around a sun.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s1_t1", "label": "Ellipses Centered at the Origin", "shape": "dot", "title": "\u003cb\u003eEllipses Centered at the Origin\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eFrom the definition above we can find an equation\u003cbr\u003efor an ellipse. We will find it for a ellipse\u003cbr\u003ecentered at the origin \\(C\\left( {0,0} \\right)\\)\u003cbr\u003ewith foci at \\({F_1}\\left( {c,0} \\right)\\) and\u003cbr\u003e\\({F_2}\\left( { - c,0} \\right)\\) where \\(c \u003e 0\\).\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s1_t2", "label": "Ellipses Not Centered at the Origin", "shape": "dot", "title": "\u003cb\u003eEllipses Not Centered at the Origin\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eNot all ellipses are centered at the origin. The\u003cbr\u003egraph of such an ellipse is a shift of the graph\u003cbr\u003ecentered at the origin, so the standard equation\u003cbr\u003efor one centered at (\\(h\\), \\(k\\)) is slightly\u003cbr\u003edifferent.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s1_t3", "label": "Bridges with Semielliptical Arches", "shape": "dot", "title": "\u003cb\u003eBridges with Semielliptical Arches\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eArches have been used to build bridges for\u003cbr\u003ecenturies, like in the Skerton Bridge in England\u003cbr\u003ewhich uses five semielliptical arches for support.\u003cbr\u003eSemielliptical arches can have engineering\u003cbr\u003ebenefits such as allowing for longer spans between\u003cbr\u003esupports.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s1_t4", "label": "Ellipse Foci", "shape": "dot", "title": "\u003cb\u003eEllipse Foci\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eThe location of the foci can play a key role in\u003cbr\u003eellipse application problems. Standing on a focus\u003cbr\u003ein a whispering gallery allows you to hear someone\u003cbr\u003ewhispering at the other focus.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s1_t5", "label": "Planetary Orbits", "shape": "dot", "title": "\u003cb\u003ePlanetary Orbits\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 1 (easy)\u003cbr\u003e\u003ci\u003eIt was long thought that planetary orbits around\u003cbr\u003ethe sun were circular. Around 1600, Johannes\u003cbr\u003eKepler discovered they were really elliptical\u003cbr\u003e(Technically, they\u2019re approximately elliptical.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch9_s2_t1", "label": "Hyperbolas Centered at the Origin", "shape": "dot", "title": "\u003cb\u003eHyperbolas Centered at the Origin\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eFrom the definition above we can find an equation\u003cbr\u003eof a hyperbola. We will find it for a hyperbola\u003cbr\u003ecentered at the origin \\(C\\left( 0,0 \\right)\\)\u003cbr\u003eopening horizontally with foci at \\[F_1\\left( c,0\u003cbr\u003e\\right)\\text{ and }F_2\\left( - c,0 \\right)\\text{\u003cbr\u003ewhere }c \u003e 0\\nonumber\\] Suppose \\(Q\\\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s2_t2", "label": "Hyperbolas Not Centered at the Origin", "shape": "dot", "title": "\u003cb\u003eHyperbolas Not Centered at the Origin\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eNot all hyperbolas are centered at the origin. The\u003cbr\u003estandard equation for one centered at (\\(h\\),\u003cbr\u003e\\(k\\)) is slightly different.\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s2_t3", "label": "Hyperbola Foci", "shape": "dot", "title": "\u003cb\u003eHyperbola Foci\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eThe location of the foci can play a key role in\u003cbr\u003ehyperbola application problems. To find them, we\u003cbr\u003eneed to find the length from the center to the\u003cbr\u003efoci, \\(c\\), using the equation \\(b^2 = c^2 -\u003cbr\u003ea^2\\).\u003c/i\u003e"}, {"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch9_s2_t4", "label": "LORAN", "shape": "dot", "title": "\u003cb\u003eLORAN\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eBefore GPS, the Long Range Navigation (LORAN)\u003cbr\u003esystem was used to determine a ship\u2019s location.\u003cbr\u003eTwo radio stations A and B simultaneously sent out\u003cbr\u003ea signal to a ship.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch9_s3_t1", "label": "Equations for Parabolas with Vertex at the Origin", "shape": "dot", "title": "\u003cb\u003eEquations for Parabolas with Vertex at the Origin\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eFrom the definition above we can find an equation\u003cbr\u003eof a parabola. We will find it for a parabola with\u003cbr\u003evertex at the origin, \\(C\\left( 0,0 \\right)\\),\u003cbr\u003eopening upward with focus at \\(F\\left( 0,p\u003cbr\u003e\\right)\\) and directrix at \\(y = - p\\).\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch9_s3_t2", "label": "Applications of Parabolas", "shape": "dot", "title": "\u003cb\u003eApplications of Parabolas\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn an earlier section, we learned that ellipses\u003cbr\u003ehave a special property that a ray emanating from\u003cbr\u003eone focus will be reflected back to the other\u003cbr\u003efocus, the property that enables the whispering\u003cbr\u003echamber to work. Parabolas also have a special\u003cbr\u003eproperty, that any ray emanating from the\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch9_s3_t3", "label": "Non-Linear Systems of Equations", "shape": "dot", "title": "\u003cb\u003eNon-Linear Systems of Equations\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (
