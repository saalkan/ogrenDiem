u003erelationships, it is natural for us to ask \"If I\u003cbr\u003eknow one quantity, can I then determine the\u003cbr\u003eother?\" This establishes the idea of an input\u003cbr\u003equantity, or independent var\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e  \u00b7 Decomposing Functions\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Short Run Behavior\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e  \u00b7 Polar Coordinates\u003cbr\u003e  \u00b7 Dot Product\u003cbr\u003e  \u00b7 Parametric Equations","\u003cb\u003eFunction Notation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eTo simplify writing out expressions and equations\u003cbr\u003einvolving functions, a simplified notation is\u003cbr\u003eoften used. We also use descriptive variables to\u003cbr\u003ehelp us remember the meaning of the quantities in\u003cbr\u003ethe problem.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Tables as Functions","\u003cb\u003eTables as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eFunctions can be represented in many ways: Words\u003cbr\u003e(as we did in the last few examples), tables of\u003cbr\u003evalues, graphs, or formulas. Represented as a\u003cbr\u003etable, we are presented with a list of input and\u003cbr\u003eoutput values.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Solving and Evaluating Functions","\u003cb\u003eSolving and Evaluating Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eWhen we work with functions, there are two typical\u003cbr\u003ethings we do: evaluate and solve. Evaluating a\u003cbr\u003efunction is what we do when we know an input, and\u003cbr\u003euse the function to determine the corresponding\u003cbr\u003eoutput.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Graphs as Functions","\u003cb\u003eGraphs as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eOftentimes a graph of a relationship can be used\u003cbr\u003eto define a function. By convention, graphs are\u003cbr\u003etypically created with the input quantity along\u003cbr\u003ethe horizontal axis and the output quantity along\u003cbr\u003ethe vertical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Formulas as Functions","\u003cb\u003eFormulas as Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t6\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eWhen possible, it is very convenient to define\u003cbr\u003erelationships using formulas. If it is possible to\u003cbr\u003eexpress the output as a formula involving the\u003cbr\u003einput quantity, then we can define a function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Basic Toolkit Functions","\u003cb\u003eBasic Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s1_t7\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eIn this text, we will be exploring functions \u2013 the\u003cbr\u003eshapes of their graphs, their unique features,\u003cbr\u003etheir equations, and how to solve problems with\u003cbr\u003ethem. When learning to read, we start with the\u003cbr\u003ealphabet.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e  \u00b7 Notation","\u003cb\u003eNotation\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eIn the previous examples, we used inequalities to\u003cbr\u003edescribe the domain and range of the functions.\u003cbr\u003eThis is one way to describe intervals of input and\u003cbr\u003eoutput values, but is not the only way.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain and Range from Graphs","\u003cb\u003eDomain and Range from Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eWe can also talk about domain and range based on\u003cbr\u003egraphs. Since domain refers to the set of possible\u003cbr\u003einput values, the domain of a graph consists of\u003cbr\u003eall the input values shown on the graph.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Notation\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Piecewise Functions","\u003cb\u003ePiecewise Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 9\u003cbr\u003e\u003cbr\u003eIn the toolkit functions we introduced the\u003cbr\u003eabsolute value function \\(f(x)=\\left|x\\right|\\).\u003cbr\u003eWith a domain of all real numbers and a range of\u003cbr\u003evalues greater than or equal to 0, the absolute\u003cbr\u003evalue can be defined as the magnitude or modulus\u003cbr\u003eof a number, a real nu\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain and Range from Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior of Functions","\u003cb\u003eGraphical Behavior of Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eAs part of exploring how functions change, it is\u003cbr\u003einteresting to explore the graphical behavior of\u003cbr\u003efunctions. Notice in the last example that we used\u003cbr\u003eopen intervals (intervals that don\u2019t include the\u003cbr\u003eendpoints) since the function is neither\u003cbr\u003eincreasing nor decrea\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Piecewise Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e  \u00b7 Concavity","\u003cb\u003eConcavity\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eThe total sales, in thousands of dollars, for two\u003cbr\u003ecompanies over 4 weeks are shown. As you can see,\u003cbr\u003ethe sales for each company are increasing, but\u003cbr\u003ethey are increasing in very different ways.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions","\u003cb\u003eBehaviors of the Toolkit Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 12\u003cbr\u003e\u003cbr\u003eWe will now return to our toolkit functions and\u003cbr\u003ediscuss their graphical behavior. Function\u003cbr\u003eIncreasing\u002fDecreasing Concavity Constant Function\u003cbr\u003e\\(f(x)=c\\) Neither increasing nor decreasing\u003cbr\u003eNeither concave up nor down Identity Function\u003cbr\u003e\\(f(x)=x\\) Increasing Neithe\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior of Functions\u003cbr\u003e  \u00b7 Concavity\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs","\u003cb\u003eComposition of Functions using Tables and Graphs\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 13\u003cbr\u003e\u003cbr\u003eWhen working with functions given as tables and\u003cbr\u003egraphs, we can look up values for the functions\u003cbr\u003eusing a provided table or graph, as discussed in\u003cbr\u003esection 1.1. We start evaluation from the provided\u003cbr\u003einput, and first evaluate the inside function.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Function Notation\u003cbr\u003e  \u00b7 Tables as Functions\u003cbr\u003e  \u00b7 Solving and Evaluating Functions\u003cbr\u003e  \u00b7 Graphs as Functions\u003cbr\u003e  \u00b7 Formulas as Functions\u003cbr\u003e  \u00b7 Basic Toolkit Functions\u003cbr\u003e  \u00b7 Behaviors of the Toolkit Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Composition using Formulas","\u003cb\u003eComposition using Formulas\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 14\u003cbr\u003e\u003cbr\u003eWhen evaluating a composition of functions where\u003cbr\u003ewe have either created or been given formulas, the\u003cbr\u003econcept of working from the inside out remains the\u003cbr\u003esame. First, we evaluate the inside function using\u003cbr\u003ethe input value provided, then use the resulting\u003cbr\u003eoutput as\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition of Functions using Tables and Graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Domain of Compositions","\u003cb\u003eDomain of Compositions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 15\u003cbr\u003e\u003cbr\u003eWhen we think about the domain of a composition\u003cbr\u003e\\(h(x)=f(g(x))\\), we must consider both the domain\u003cbr\u003eof the inner function and the domain of the\u003cbr\u003ecomposition itself. While it is tempting to only\u003cbr\u003elook at the resulting composite function, if the\u003cbr\u003einner function were\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Composition using Formulas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Decomposing Functions","\u003cb\u003eDecomposing Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch1_s4_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 16\u003cbr\u003e\u003cbr\u003eIn some cases, it is desirable to decompose a\u003cbr\u003efunction \u2013 to write it as a composition of two\u003cbr\u003esimpler functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Domain of Compositions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions"],"marker":{"color":"#e74c3c","line":{"color":"#111","width":1},"opacity":0.96,"size":13},"mode":"markers+text","name":"Cluster 1: Functions and Function Notation \u002f Composition of\u2026 \u00b7 17 topics \u00b7 ch 1","text":["What is a Function?","Function Notation","Tables as Functions","Solving and Evaluating Functions","Graphs as Functions","Formulas as Functions","Basic Toolkit Functions","Notation","Domain and Range from Graphs","Piecewise Functions","Graphical Behavior of Functions","Concavity","Behaviors of the Toolkit Functions","Composition of Functions using Tables and Graphs","Composition using Formulas","Domain of Compositions","Decomposing Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,4.7871355387816905,9.574271077563381,14.361406616345072,19.148542155126762,23.935677693908453,28.722813232690143,33.509948771471834,38.297084310253524,43.084219849035215,47.871355387816905,52.658490926598596,57.445626465380286,62.23276200416198,67.01989754294367,71.80703308172536,76.59416862050705],"y":[0.0837148462659157,0.4203455135749171,0.36688559218772143,0.28761367940598564,0.1643078282109697,-0.03352253472495002,-0.3124912575718699,-0.6218026537933584,-0.2592652152795342,0.060039014644526975,0.32005312566957766,0.48448114184809965,0.4283982733371018,0.14773011281145226,-0.06554804398686284,-0.21203767725201303,-0.259342577304338],"z":[-0.25147395231053576,-0.4305567690955732,-0.6031  fairly similar\u003cbr\u003eshape, very similar to the quadratic toolkit, but\u003cbr\u003eas the power increases the graphs flatte\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Vectors\u003cbr\u003e  \u00b7 Planetary Orbits\u003cbr\u003e  \u00b7 LORAN","\u003cb\u003eFactor Theorem and Remainder Theorem\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 29\u003cbr\u003e\u003cbr\u003eIn the last section, we limited ourselves to\u003cbr\u003efinding the intercepts, or zeros, of polynomials\u003cbr\u003ethat factored simply, or we turned to technology.\u003cbr\u003eIn this section, we will look at algebraic\u003cbr\u003etechniques for finding the zeros of polynomials\u003cbr\u003elike \\(h(t)=t^{3} +4t^{2}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Real Zeros of Polynomials","\u003cb\u003eReal Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 30\u003cbr\u003e\u003cbr\u003eIn the last section, we saw how to determine if a\u003cbr\u003ereal number was a zero of a polynomial. In this\u003cbr\u003esection, we will learn how to find good candidates\u003cbr\u003eto test using synthetic division.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers","\u003cb\u003eArithmetic on Complex Numbers\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 31\u003cbr\u003e\u003cbr\u003eBefore we dive into the more complicated uses of\u003cbr\u003ecomplex numbers, let\u2019s make sure we remember the\u003cbr\u003ebasic arithmetic involved. To add or subtract\u003cbr\u003ecomplex numbers, we simply add the like terms,\u003cbr\u003ecombining the real parts and combining the\u003cbr\u003eimaginary parts.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e  \u00b7 Vectors","\u003cb\u003eComplex Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 32\u003cbr\u003e\u003cbr\u003eComplex numbers allow us a way to write solutions\u003cbr\u003eto quadratic equations that do not have real\u003cbr\u003esolutions. Exercise \\(\\PageIndex{3}\\) Find the\u003cbr\u003ezeros of \\(f(x)=2x^{2} +3x+4\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Rational Functions","\u003cb\u003eRational Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s7_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 7 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 33\u003cbr\u003e\u003cbr\u003eIn the previous sections, we have built\u003cbr\u003epolynomials based on the positive whole number\u003cbr\u003epower functions. In this section, we explore\u003cbr\u003efunctions based on power functions with negative\u003cbr\u003einteger powers, called rational functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverses and Radical Functions","\u003cb\u003eInverses and Radical Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s8_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 8 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 34\u003cbr\u003e\u003cbr\u003eIn this section, we will explore the inverses of\u003cbr\u003epolynomial and rational functions, and in\u003cbr\u003eparticular the radical functions that arise in the\u003cbr\u003eprocess. The previous example illustrated two\u003cbr\u003eimportant things: When finding the inverse of a\u003cbr\u003equadratic, we have to li\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Law of Sines","\u003cb\u003eLaw of Sines\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 35\u003cbr\u003e\u003cbr\u003eGiven an arbitrary non-right triangle, we can drop\u003cbr\u003ean altitude, which we temporarily label \\(h\\), to\u003cbr\u003ecreate two right triangles. Using the right\u003cbr\u003etriangle relationships, \\[\\sin (\\alpha ) =\u003cbr\u003e\\dfrac{h}{b}\\text{ and }\\sin (\\beta ) =\u003cbr\u003e\\dfrac{h}{a}\\nonumber\\] Solving \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverses and Radical Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Law of Cosines","\u003cb\u003eLaw of Cosines\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 36\u003cbr\u003e\u003cbr\u003eSuppose a boat leaves port, travels 10 miles,\u003cbr\u003eturns 20 degrees, and travels another 8 miles. How\u003cbr\u003efar from port is the boat?\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Law of Sines\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polar Coordinates","\u003cb\u003ePolar Coordinates\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 37\u003cbr\u003e\u003cbr\u003eThe coordinate system we are most familiar with is\u003cbr\u003ecalled the Cartesian coordinate system, a\u003cbr\u003erectangular plane divided into four quadrants by\u003cbr\u003ehorizontal and vertical axes. In earlier chapters,\u003cbr\u003ewe often found the Cartesian coordinates of a\u003cbr\u003epoint on a circle at \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Law of Cosines\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers","\u003cb\u003ePolar Form of Complex Numbers\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 38\u003cbr\u003e\u003cbr\u003eFrom previous classes, you may have encountered\u003cbr\u003e\u201cimaginary numbers\u201d \u2013 the square roots of negative\u003cbr\u003enumbers \u2013 and, more generally, complex numbers\u003cbr\u003ewhich are the sum of a real number and an\u003cbr\u003eimaginary number. While these are useful for\u003cbr\u003eexpressing the solutions to\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e  \u00b7 Polar Coordinates\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Vectors\u003cbr\u003e  \u00b7 Dot Product\u003cbr\u003e  \u00b7 Parametric Equations\u003cbr\u003e  \u00b7 Conics in Polar Coordinates","\u003cb\u003eVectors\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 39\u003cbr\u003e\u003cbr\u003eA woman leaves home, walks 3 miles north, then 2\u003cbr\u003emiles southeast. How far is she from home, and in\u003cbr\u003ewhich direction would she need to walk to return\u003cbr\u003ehome?\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Dot Product","\u003cb\u003eDot Product\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 40\u003cbr\u003e\u003cbr\u003eNow that we can add, subtract, and scale vectors,\u003cbr\u003eyou might be wondering whether we can multiply\u003cbr\u003evectors. It turns out there are two different ways\u003cbr\u003eto multiply vectors, one which results in a\u003cbr\u003enumber, and one which results in a vector.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e  \u00b7 Vectors\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Parametric Equations","\u003cb\u003eParametric Equations\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch8_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 41\u003cbr\u003e\u003cbr\u003eMany shapes, even ones as simple as circles,\u003cbr\u003ecannot be represented as an equation where \\(y\\)\u003cbr\u003eis a function of \\(x\\). Consider, for example, the\u003cbr\u003epath a moon follows as it orbits around a planet,\u003cbr\u003ewhich simultaneously rotates around a sun.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Inverse Functions\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e  \u00b7 Dot Product\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin"],"marker":{"color":"#f39c12","line":{"color":"#111","width":1},"opacity":0.96,"size":13},"mode":"markers+text","name":"Cluster 2: Complex Zeros \u002f Non-Right Triangles - Laws\u2026 \u00b7 15 topics \u00b7 ch 1,3,8","text":["Inverse Functions","Characteristics of Power Functions","Factor Theorem and Remainder Theorem","Real Zeros of Polynomials","Arithmetic on Complex Numbers","Complex Zeros of Polynomials","Rational Functions","Inverses and Radical Functions","Law of Sines","Law of Cosines","Polar Coordinates","Polar Form of Complex Numbers","Vectors","Dot Product","Parametric Equations"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[86.16843969807043,90.95557523685213,138.82693062466902,143.61406616345073,148.4012017022324,153.1883372410141,157.97547277979578,162.76260831857746,167.54974385735918,172.33687939614086,177.12401493492254,181.91115047370425,186.69828601248594,191.48542155126762,196.2725570900493],"y":[-0.09546401750144744,0.035014800  Remainder Theorem\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e  \u00b7 Rational Functions\u003cbr\u003e  \u00b7 Polar Coordinates\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e  \u00b7 Vectors\u003cbr\u003e  \u00b7 Parametric Equations\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Ellipses Not Centered at the Origin\u003cbr\u003e  \u00b7 Ellipse Foci\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Not Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbola Foci\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin\u003cbr\u003e  \u00b7 Conics in Polar Coordinates","\u003cb\u003eEllipses Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 42\u003cbr\u003e\u003cbr\u003eFrom the definition above we can find an equation\u003cbr\u003efor an ellipse. We will find it for a ellipse\u003cbr\u003ecentered at the origin \\(C\\left( {0,0} \\right)\\)\u003cbr\u003ewith foci at \\({F_1}\\left( {c,0} \\right)\\) and\u003cbr\u003e\\({F_2}\\left( { - c,0} \\right)\\) where \\(c \u003e 0\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Parametric Equations\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Not Centered at the Origin\u003cbr\u003e  \u00b7 Ellipse Foci\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Not Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbola Foci\u003cbr\u003e  \u00b7 LORAN\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin\u003cbr\u003e  \u00b7 Applications of Parabolas\u003cbr\u003e  \u00b7 Non-Linear Systems of Equations\u003cbr\u003e  \u00b7 Conics in Polar Coordinates","\u003cb\u003eEllipses Not Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 43\u003cbr\u003e\u003cbr\u003eNot all ellipses are centered at the origin. The\u003cbr\u003egraph of such an ellipse is a shift of the graph\u003cbr\u003ecentered at the origin, so the standard equation\u003cbr\u003efor one centered at (\\(h\\), \\(k\\)) is slightly\u003cbr\u003edifferent.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Bridges with Semielliptical Arches","\u003cb\u003eBridges with Semielliptical Arches\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 44\u003cbr\u003e\u003cbr\u003eArches have been used to build bridges for\u003cbr\u003ecenturies, like in the Skerton Bridge in England\u003cbr\u003ewhich uses five semielliptical arches for support.\u003cbr\u003eSemielliptical arches can have engineering\u003cbr\u003ebenefits such as allowing for longer spans between\u003cbr\u003esupports.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Not Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipse Foci","\u003cb\u003eEllipse Foci\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 45\u003cbr\u003e\u003cbr\u003eThe location of the foci can play a key role in\u003cbr\u003eellipse application problems. Standing on a focus\u003cbr\u003ein a whispering gallery allows you to hear someone\u003cbr\u003ewhispering at the other focus.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Bridges with Semielliptical Arches\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Planetary Orbits","\u003cb\u003ePlanetary Orbits\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 46\u003cbr\u003e\u003cbr\u003eIt was long thought that planetary orbits around\u003cbr\u003ethe sun were circular. Around 1600, Johannes\u003cbr\u003eKepler discovered they were really elliptical\u003cbr\u003e(Technically, they\u2019re approximately elliptical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Ellipse Foci\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin","\u003cb\u003eHyperbolas Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 47\u003cbr\u003e\u003cbr\u003eFrom the definition above we can find an equation\u003cbr\u003eof a hyperbola. We will find it for a hyperbola\u003cbr\u003ecentered at the origin \\(C\\left( 0,0 \\right)\\)\u003cbr\u003eopening horizontally with foci at \\[F_1\\left( c,0\u003cbr\u003e\\right)\\text{ and }F_2\\left( - c,0 \\right)\\text{\u003cbr\u003ewhere }c \u003e 0\\non\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Planetary Orbits\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Hyperbolas Not Centered at the Origin","\u003cb\u003eHyperbolas Not Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 48\u003cbr\u003e\u003cbr\u003eNot all hyperbolas are centered at the origin. The\u003cbr\u003estandard equation for one centered at (\\(h\\),\u003cbr\u003e\\(k\\)) is slightly different.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Hyperbola Foci","\u003cb\u003eHyperbola Foci\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 49\u003cbr\u003e\u003cbr\u003eThe location of the foci can play a key role in\u003cbr\u003ehyperbola application problems. To find them, we\u003cbr\u003eneed to find the length from the center to the\u003cbr\u003efoci, \\(c\\), using the equation \\(b^2 = c^2 -\u003cbr\u003ea^2\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Not Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 LORAN","\u003cb\u003eLORAN\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 50\u003cbr\u003e\u003cbr\u003eBefore GPS, the Long Range Navigation (LORAN)\u003cbr\u003esystem was used to determine a ship\u2019s location.\u003cbr\u003eTwo radio stations A and B simultaneously sent out\u003cbr\u003ea signal to a ship.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbola Foci\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin","\u003cb\u003eEquations for Parabolas with Vertex at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 51\u003cbr\u003e\u003cbr\u003eFrom the definition above we can find an equation\u003cbr\u003eof a parabola. We will find it for a parabola with\u003cbr\u003evertex at the origin, \\(C\\left( 0,0 \\right)\\),\u003cbr\u003eopening upward with focus at \\(F\\left( 0,p\u003cbr\u003e\\right)\\) and directrix at \\(y = - p\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 LORAN\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Applications of Parabolas","\u003cb\u003eApplications of Parabolas\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 52\u003cbr\u003e\u003cbr\u003eIn an earlier section, we learned that ellipses\u003cbr\u003ehave a special property that a ray emanating from\u003cbr\u003eone focus will be reflected back to the other\u003cbr\u003efocus, the property that enables the whispering\u003cbr\u003echamber to work. Parabolas also have a special\u003cbr\u003eproperty, that any ra\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Non-Linear Systems of Equations","\u003cb\u003eNon-Linear Systems of Equations\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 53\u003cbr\u003e\u003cbr\u003eIn many applications, it is necessary to solve for\u003cbr\u003ethe intersection of two curves. Many of the\u003cbr\u003etechniques you may have used before to solve\u003cbr\u003esystems of linear equations will work for\u003cbr\u003enon-linear equations as well, particularly\u003cbr\u003esubstitution.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Applications of Parabolas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Conics in Polar Coordinates","\u003cb\u003eConics in Polar Coordinates\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 54\u003cbr\u003e\u003cbr\u003eIn the preceding sections, we defined each conic\u003cbr\u003ein a different way, but each involved the distance\u003cbr\u003ebetween a point on the curve and the focus. In the\u003cbr\u003eprevious section, the parabola was defined using\u003cbr\u003ethe focus and a line called the directrix .\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Polar Form of Complex Numbers\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Non-Linear Systems of Equations"],"marker":{"color":"#f1c40f","line":{"color":"#111","width":1},"opacity":0.96,"size":13},"mode":"markers+text","name":"Cluster 3: Ellipses \u002f Hyperbolas \u00b7 14 topics \u00b7 ch 1,9","text":["Transformation of Functions","Ellipses Centered at the Origin","Ellipses Not Centered at the Origin","Bridges with Semielliptical Arches","Ellipse Foci","Planetary Orbits","Hyperbolas Centered at the Origin","Hyperbolas Not Centered at the Origin","Hyperbola Foci","LORAN","Equations for Parabolas with Vertex at the Origin","Applications of Parabolas","Non-Linear Systems of Equations","Conics in Polar Coordinates"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[81.38130415928873,201.059692628831,205.8468281676127,210.63396370639438,215.42109924517607,220.20823478395778,224.99537032273946,229.78250586152114,234.56964140030283,239.3567769390845,244.14391247786622,248.9310480166479,253.7181835554296,258.5053190942113],"y":[-0.04990670786879274,-0.12380623897425352,0.17705213521653404,0.2951075364233916,0.11332096608057358,0.04803754238543739,-0.1623045147565804,-0.2918125351382617,-0.35122348230581546,-0.1802171541030206,-0.06980552490532688,-0.08381834702025386,-0.31669176904536694,-0.3195985442600946],"z":[0.2795766790769187,0.6295061030598874,0.6989777829828868,1.0,0.757862264875687,0.6861945215483257,0.7151975375165458,0.6629393260023135,0.5857411431504079,0.5713843715740988,0.7233439777392189,0.9380981835308634,0.8813857308647643,0.5087529810939849],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eShort run Behavior: Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 24\u003cbr\u003e\u003cbr\u003eAs with any function, the vertical intercept can\u003cbr\u003ebe found by evaluating the function at an input of\u003cbr\u003ezero. Since this is evaluation, it is relatively\u003cbr\u003eeasy to do it for a polynomial of any degree.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts","\u003cb\u003eGraphical Behavior at Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 25\u003cbr\u003e\u003cbr\u003eIf we graph the function \\(f(x)=(x+3)(x-2)^{2}\u003cbr\u003e(x+1)^{3}\\), notice that the behavior at each of\u003cbr\u003ethe horizontal intercepts is different. At the\u003cbr\u003ehorizontal intercept x = -3, coming from the\u003cbr\u003e\\((x+3)\\) factor of the polynomial, the graph\u003cbr\u003epasses directly through th\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities","\u003cb\u003eSolving Polynomial Inequalities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 26\u003cbr\u003e\u003cbr\u003eOne application of our ability to find intercepts\u003cbr\u003eand sketch a graph of polynomials is the ability\u003cbr\u003eto solve polynomial inequalities. It is a very\u003cbr\u003ecommon question to ask when a function will be\u003cbr\u003epositive and negative.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Writing Equations using Intercepts","\u003cb\u003eWriting Equations using Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 27\u003cbr\u003e\u003cbr\u003eSince a polynomial function written in factored\u003cbr\u003eform will have a horizontal intercept where each\u003cbr\u003efactor is equal to zero, we can form a function\u003cbr\u003ethat will pass through a set of horizontal\u003cbr\u003eintercepts by introducing a corresponding set of\u003cbr\u003efactors. factored form \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Estimating Extrema","\u003cb\u003eEstimating Extrema\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 28\u003cbr\u003e\u003cbr\u003eWith quadratics, we were able to algebraically\u003cbr\u003efind the maximum or minimum value of the function\u003cbr\u003eby finding the vertex. For general polynomials,\u003cbr\u003efinding these turning points is not possible\u003cbr\u003ewithout more advanced techniques from calculus.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 What is a Function?\u003cbr\u003e  \u00b7 Transformation of Functions\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem"],"marker":{"color":"#2ecc71","line":{"color":"#111","width":1},"opacity":0.96,"size":13},"mode":"markers+text","name":"Cluster 4: Graphs of Polynomial Functions \u00b7 5 topics \u00b7 ch 3","text":["Short run Behavior: Intercepts","Graphical Behavior at Intercepts","Solving Polynomial Inequalities","Writing Equations using Intercepts","Estimating Extrema"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[114.89125293076057,119.67838846954226,124.46552400
