0.15399761404098897,-0.2065966693756068,-0.49191163469400945],"z":[-0.17064665178333113,-0.416812865690831,0.2862030923763675,0.5491994703457865,-0.45846336507331004,-0.789396581545386,-0.9424068965943064,-0.7667765559500198,-0.416812865690831,-0.4793069708009644,-0.2735701701827084,0.04127723247236823,0.2862030923763675,0.6687837517388913,1.0,0.9220944009932571,0.5491994703457865,0.7721623494397051],"type":"cone"},{"hoverinfo":"text","hovertext":["\u003cb\u003eCharacteristics of Power Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 0\u003cbr\u003e\u003cbr\u003eShown to the right are the graphs of\u003cbr\u003e\\(f(x)=x^{2}\\), \\(f(x)=x^{4}\\), and\u003cbr\u003e\\(f(x)=x^{6}\\), all even whole number powers.\u003cbr\u003eNotice that all these graphs have a fairly similar\u003cbr\u003eshape, very similar to the quadratic toolkit, but\u003cbr\u003eas the power increases the graphs flatte\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e  \u00b7 Rational Functions","\u003cb\u003ePolynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eAn oil pipeline bursts in the Gulf of Mexico,\u003cbr\u003ecausing an oil slick in a roughly circular shape.\u003cbr\u003eThe slick is currently 24 miles in radius, but\u003cbr\u003ethat radius is increasing by 8 miles each week.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short Run Behavior","\u003cb\u003eShort Run Behavior\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eCharacteristics of the graph such as vertical and\u003cbr\u003ehorizontal intercepts and the places the graph\u003cbr\u003echanges direction are part of the short run\u003cbr\u003ebehavior of the polynomial. Like with all\u003cbr\u003efunctions, the vertical intercept is where the\u003cbr\u003egraph crosses the vertical axi\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Vertex","\u003cb\u003eShort run Behavior: Vertex\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eWe now explore the interesting features of the\u003cbr\u003egraphs of quadratics. In addition to intercepts,\u003cbr\u003equadratics have an interesting feature where they\u003cbr\u003echange direction, called the vertex .\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short Run Behavior\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts","\u003cb\u003eShort run Behavior: Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eAs with any function, we can find the vertical\u003cbr\u003eintercepts of a quadratic by evaluating the\u003cbr\u003efunction at an input of zero, and we can find the\u003cbr\u003ehorizontal intercepts by solving for when the\u003cbr\u003eoutput will be zero. Notice that depending upon\u003cbr\u003ethe location of the graph\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Vertex\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts","\u003cb\u003eShort run Behavior: Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 5\u003cbr\u003e\u003cbr\u003eAs with any function, the vertical intercept can\u003cbr\u003ebe found by evaluating the function at an input of\u003cbr\u003ezero. Since this is evaluation, it is relatively\u003cbr\u003eeasy to do it for a polynomial of any degree.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts","\u003cb\u003eSolving Polynomial Inequalities\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eOne application of our ability to find intercepts\u003cbr\u003eand sketch a graph of polynomials is the ability\u003cbr\u003eto solve polynomial inequalities. It is a very\u003cbr\u003ecommon question to ask when a function will be\u003cbr\u003epositive and negative.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Graphical Behavior at Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Writing Equations using Intercepts","\u003cb\u003eWriting Equations using Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eSince a polynomial function written in factored\u003cbr\u003eform will have a horizontal intercept where each\u003cbr\u003efactor is equal to zero, we can form a function\u003cbr\u003ethat will pass through a set of horizontal\u003cbr\u003eintercepts by introducing a corresponding set of\u003cbr\u003efactors. factored form \u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Estimating Extrema","\u003cb\u003eEstimating Extrema\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 9\u003cbr\u003e\u003cbr\u003eWith quadratics, we were able to algebraically\u003cbr\u003efind the maximum or minimum value of the function\u003cbr\u003eby finding the vertex. For general polynomials,\u003cbr\u003efinding these turning points is not possible\u003cbr\u003ewithout more advanced techniques from calculus.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Writing Equations using Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem"],"marker":{"color":"#6ab04c","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"easy","text":["Characteristics of Power Functions","Polynomials","Short Run Behavior","Short run Behavior: Vertex","Short run Behavior: Intercepts","Short run Behavior: Intercepts","Solving Polynomial Inequalities","Writing Equations using Intercepts","Estimating Extrema"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[0.0,2.5,5.0,7.5,10.0,12.5,17.5,20.0,22.5],"y":[0.01727497007329484,0.41952644663474004,0.7047170185436579,0.7701497325862545,0.5088561563825656,0.19568533413351777,-0.41549462534660614,-0.6491758487350079,-0.5254642673183855],"z":[0.05765976025448161,-0.17064665178333113,-0.45846336507331004,-0.789396581545386,-0.9424068965943064,-0.7667765559500198,-0.4793069708009644,-0.2735701701827084,0.04127723247236823],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eGraphical Behavior at Intercepts\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eIf we graph the function \\(f(x)=(x+3)(x-2)^{2}\u003cbr\u003e(x+1)^{3}\\), notice that the behavior at each of\u003cbr\u003ethe horizontal intercepts is different. At the\u003cbr\u003ehorizontal intercept x = -3, coming from the\u003cbr\u003e\\((x+3)\\) factor of the polynomial, the graph\u003cbr\u003epasses directly through th\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Short run Behavior: Intercepts\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Solving Polynomial Inequalities","\u003cb\u003eFactor Theorem and Remainder Theorem\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eIn the last section, we limited ourselves to\u003cbr\u003efinding the intercepts, or zeros, of polynomials\u003cbr\u003ethat factored simply, or we turned to technology.\u003cbr\u003eIn this section, we will look at algebraic\u003cbr\u003etechniques for finding the zeros of polynomials\u003cbr\u003elike \\(h(t)=t^{3} +4t^{2}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Estimating Extrema\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Real Zeros of Polynomials","\u003cb\u003eReal Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eIn the last section, we saw how to determine if a\u003cbr\u003ereal number was a zero of a polynomial. In this\u003cbr\u003esection, we will learn how to find good candidates\u003cbr\u003eto test using synthetic division.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Factor Theorem and Remainder Theorem\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Graphical Behavior at Intercepts","Factor Theorem and Remainder Theorem","Real Zeros of Polynomials"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[15.0,25.0,27.5],"y":[-0.051980371142730825,-0.1984328548217995,0.010417697664414558],"z":[-0.416812865690831,0.2862030923763675,0.6687837517388913],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eArithmetic on Complex Numbers\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 12\u003cbr\u003e\u003cbr\u003eBefore we dive into the more complicated uses of\u003cbr\u003ecomplex numbers, let\u2019s make sure we remember the\u003cbr\u003ebasic arithmetic involved. To add or subtract\u003cbr\u003ecomplex numbers, we simply add the like terms,\u003cbr\u003ecombining the real parts and combining the\u003cbr\u003eimaginary parts.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Real Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials","\u003cb\u003eComplex Zeros of Polynomials\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s6_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 6 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 13\u003cbr\u003e\u003cbr\u003eComplex numbers allow us a way to write solutions\u003cbr\u003eto quadratic equations that do not have real\u003cbr\u003esolutions. Exercise \\(\\PageIndex{3}\\) Find the\u003cbr\u003ezeros of \\(f(x)=2x^{2} +3x+4\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Arithmetic on Complex Numbers\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Rational Functions","\u003cb\u003eRational Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s7_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 7 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 14\u003cbr\u003e\u003cbr\u003eIn the previous sections, we have built\u003cbr\u003epolynomials based on the positive whole number\u003cbr\u003epower functions. In this section, we explore\u003cbr\u003efunctions based on power functions with negative\u003cbr\u003einteger powers, called rational functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Characteristics of Power Functions\u003cbr\u003e  \u00b7 Complex Zeros of Polynomials\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Inverses and Radical Functions","\u003cb\u003eInverses and Radical Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch3_s8_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 8 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 15\u003cbr\u003e\u003cbr\u003eIn this section, we will explore the inverses of\u003cbr\u003epolynomial and rational functions, and in\u003cbr\u003eparticular the radical functions that arise in the\u003cbr\u003eprocess. The previous example illustrated two\u003cbr\u003eimportant things: When finding the inverse of a\u003cbr\u003equadratic, we have to li\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Rational Functions"],"marker":{"color":"#eb4d4b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"hard","text":["Arithmetic on Complex Numbers","Complex Zeros of Polynomials","Ra
