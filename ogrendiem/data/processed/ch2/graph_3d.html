eid:\u003c\u002fi\u003e ch2_s2_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eWhen we are working with a new function, it is\u003cbr\u003euseful to know as much as we can about the\u003cbr\u003efunction: its graph, where the function is zero,\u003cbr\u003eand any other special behaviors of the function.\u003cbr\u003eWe will begin this exploration of linear functions\u003cbr\u003ewith a look at graphs\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data\u003cbr\u003e  \u00b7 Absolute Value Functions","\u003cb\u003eModeling with Linear Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s3_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eWhen modeling scenarios with a linear function and\u003cbr\u003esolving problems involving quantities changing\u003cbr\u003elinearly, we typically follow the same problem\u003cbr\u003esolving strategies that we would use for any type\u003cbr\u003eof function: Problem Solving Strategy Identify\u003cbr\u003echanging quantitie\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Fitting Linear Models to Data"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Graphs of Linear Functions","Modeling with Linear Functions"],"textfont":{"color":"#74b9ff","size":10},"textposition":"top center","x":[2.5,5.0],"y":[0.2060990609939124,1.0],"z":[0.24364338021826792,0.1704551435724219],"type":"scatter3d"},{"hoverinfo":"text","hovertext":["\u003cb\u003eFitting Linear Models to Data\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s4_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 4 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 4 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eIn the real world, rarely do things follow trends\u003cbr\u003eperfectly. When we expect the trend to behave\u003cbr\u003elinearly, or when inspection suggests the trend is\u003cbr\u003ebehaving linearly, it is often desirable to find\u003cbr\u003ean equation to approximate the data.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Modeling with Linear Functions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Absolute Value Functions","\u003cb\u003eAbsolute Value Functions\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch2_s5_t1\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 5 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 5 (hard) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eSo far in this chapter we have been studying the\u003cbr\u003ebehavior of linear functions. The Absolute Value\u003cbr\u003eFunction is a piecewise-defined function made up\u003cbr\u003eof two linear functions.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Linear Functions\u003cbr\u003e  \u00b7 Graphs of Linear Functions\u003cbr\u003e  \u00b7 Fitting Linear Models to Data"],"marker":{"color":"#
