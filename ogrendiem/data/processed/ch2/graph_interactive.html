                  nodes = new vis.DataSet([{"color": "#6ab04c", "font": {"color": "#74b9ff"}, "id": "ch2_s1_t1", "label": "Linear Functions", "shape": "dot", "title": "\u003cb\u003eLinear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 1 \u00b7 difficulty 2 (easy)\u003cbr\u003e\u003ci\u003eAs you hop into a taxicab in Las Vegas, the meter\u003cbr\u003ewill immediately read $3.50; this is the \u201cdrop\u201d\u003cbr\u003echarge made when the taximeter is activated. After\u003cbr\u003ethat initial fee, the taximeter will add $2.76 for\u003cbr\u003eeach mile the taxi drives (Nevada Taxicab\u003cbr\u003eAuthority, retrieved May 8, 2017.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch2_s2_t1", "label": "Graphs of Linear Functions", "shape": "dot", "title": "\u003cb\u003eGraphs of Linear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 2 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen we are working with a new function, it is\u003cbr\u003euseful to know as much as we can about the\u003cbr\u003efunction: its graph, where the function is zero,\u003cbr\u003eand any other special behaviors of the function.\u003cbr\u003eWe will begin this exploration of linear functions\u003cbr\u003ewith a look at graphs.\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch2_s3_t1", "label": "Modeling with Linear Functions", "shape": "dot", "title": "\u003cb\u003eModeling with Linear Functions\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eWhen modeling scenarios with a linear function and\u003cbr\u003esolving problems involving quantities changing\u003cbr\u003elinearly, we typically follow the same problem\u003cbr\u003esolving strategies that we would use for any type\u003cbr\u003eof function: Problem Solving Strategy Identify\u003cbr\u003echanging quantities, and then carefull\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch2_s4_t1", "label": "Fitting Linear Models to Data", "shape": "dot", "title": "\u003cb\u003eFitting Linear Models to Data\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 4 (hard)\u003cbr\u003e\u003ci\u003eIn the real world, rarely do things follow trends\u003cbr\u003eperfectly. When we expect the trend to behave\u003cbr\u003elinearly, or when inspection suggests the trend is\u003cbr\u003ebehaving linearly, it is often desirable to find\u003cbr\u003ean equation to approximate the data.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch2_s5_t1", "label": "Absolute Value Functions", "shape": "dot", "title": "\u003cb\u003eAbsolute Value Functions\u003c/b\u003e\u003cbr\u003e\u00a7 5 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eSo far in this chapter we have been studying the\u003cbr\u003ebehavior of linear functions. The Absolute Value\u003cbr\u003eFunction is a piecewise-defined function made up\u003cbr\u003eof two linear functions.\u003c/i\u003e"}]);
