 work. Parabolas also have a special\u003cbr\u003eproperty, that any ray emanating from the\u003c/i\u003e"}, {"color": "#f0932b", "font": {"color": "#74b9ff"}, "id": "ch9_s3_t3", "label": "Non-Linear Systems of Equations", "shape": "dot", "title": "\u003cb\u003eNon-Linear Systems of Equations\u003c/b\u003e\u003cbr\u003e\u00a7 3 \u00b7 difficulty 3 (medium)\u003cbr\u003e\u003ci\u003eIn many applications, it is necessary to solve for\u003cbr\u003ethe intersection of two curves. Many of the\u003cbr\u003etechniques you may have used before to solve\u003cbr\u003esystems of linear equations will work for\u003cbr\u003enon-linear equations as well, particularly\u003cbr\u003esubstitution.\u003c/i\u003e"}, {"color": "#eb4d4b", "font": {"color": "#74b9ff"}, "id": "ch9_s4_t1", "label": "Conics in Polar Coordinates", "shape": "dot", "title": "\u003cb\u003eConics in Polar Coordinates\u003c/b\u003e\u003cbr\u003e\u00a7 4 \u00b7 difficulty 5 (hard)\u003cbr\u003e\u003ci\u003eIn the preceding sections, we defined each conic\u003cbr\u003ein a different way, but each involved the distance\u003cbr\u003ebetween a point on the curve and the focus. In the\u003cbr\u003eprevious section, the parabola was defined using\u003cbr\u003ethe focus and a line called the directrix .\u003c/i\u003e"}]);
