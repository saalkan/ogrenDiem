u003cbr\u003e  \u00b7 LORAN\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin\u003cbr\u003e  \u00b7 Applications of Parabolas\u003cbr\u003e  \u00b7 Non-Linear Systems of Equations\u003cbr\u003e  \u00b7 Conics in Polar Coordinates","\u003cb\u003eEllipses Not Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 1\u003cbr\u003e\u003cbr\u003eNot all ellipses are centered at the origin. The\u003cbr\u003egraph of such an ellipse is a shift of the graph\u003cbr\u003ecentered at the origin, so the standard equation\u003cbr\u003efor one centered at (\\(h\\), \\(k\\)) is slightly\u003cbr\u003edifferent.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Bridges with Semielliptical Arches","\u003cb\u003eBridges with Semielliptical Arches\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 2\u003cbr\u003e\u003cbr\u003eArches have been used to build bridges for\u003cbr\u003ecenturies, like in the Skerton Bridge in England\u003cbr\u003ewhich uses five semielliptical arches for support.\u003cbr\u003eSemielliptical arches can have engineering\u003cbr\u003ebenefits such as allowing for longer spans between\u003cbr\u003esupports.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Not Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipse Foci","\u003cb\u003eEllipse Foci\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 3\u003cbr\u003e\u003cbr\u003eThe location of the foci can play a key role in\u003cbr\u003eellipse application problems. Standing on a focus\u003cbr\u003ein a whispering gallery allows you to hear someone\u003cbr\u003ewhispering at the other focus.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Bridges with Semielliptical Arches\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Planetary Orbits","\u003cb\u003ePlanetary Orbits\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s1_t5\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 1 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 1 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 4\u003cbr\u003e\u003cbr\u003eIt was long thought that planetary orbits around\u003cbr\u003ethe sun were circular. Around 1600, Johannes\u003cbr\u003eKepler discovered they were really elliptical\u003cbr\u003e(Technically, they\u2019re approximately elliptical.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipse Foci\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin","\u003cb\u003eHyperbolas Not Centered at the Origin\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 6\u003cbr\u003e\u003cbr\u003eNot all hyperbolas are centered at the origin. The\u003cbr\u003estandard equation for one centered at (\\(h\\),\u003cbr\u003e\\(k\\)) is slightly different.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Hyperbola Foci","\u003cb\u003eHyperbola Foci\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 7\u003cbr\u003e\u003cbr\u003eThe location of the foci can play a key role in\u003cbr\u003ehyperbola application problems. To find them, we\u003cbr\u003eneed to find the length from the center to the\u003cbr\u003efoci, \\(c\\), using the equation \\(b^2 = c^2 -\u003cbr\u003ea^2\\).\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbolas Not Centered at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 LORAN","\u003cb\u003eLORAN\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s2_t4\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 2 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 2 (easy) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 8\u003cbr\u003e\u003cbr\u003eBefore GPS, the Long Range Navigation (LORAN)\u003cbr\u003esystem was used to determine a ship\u2019s location.\u003cbr\u003eTwo radio stations A and B simultaneously sent out\u003cbr\u003ea signal to a ship.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Hyperbola Foci\u003cbr\u003e\u003cbr\u003e\u003cb\u00 c\u002fi\u003e ch9_s3_t2\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 10\u003cbr\u003e\u003cbr\u003eIn an earlier section, we learned that ellipses\u003cbr\u003ehave a special property that a ray emanating from\u003cbr\u003eone focus will be reflected back to the other\u003cbr\u003efocus, the property that enables the whispering\u003cbr\u003echamber to work. Parabolas also have a special\u003cbr\u003eproperty, that any ra\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Equations for Parabolas with Vertex at the Origin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Non-Linear Systems of Equations","\u003cb\u003eNon-Linear Systems of Equations\u003c\u002fb\u003e\u003cbr\u003e\u003ci\u003eid:\u003c\u002fi\u003e ch9_s3_t3\u003cbr\u003e\u003ci\u003esection:\u003c\u002fi\u003e 3 &nbsp;\u00b7&nbsp; \u003ci\u003edifficulty:\u003c\u002fi\u003e 3 (medium) &nbsp;\u00b7&nbsp; \u003ci\u003edepth:\u003c\u002fi\u003e 11\u003cbr\u003e\u003cbr\u003eIn many applications, it is necessary to solve for\u003cbr\u003ethe intersection of two curves. Many of the\u003cbr\u003etechniques you may have used before to solve\u003cbr\u003esystems of linear equations will work for\u003cbr\u003enon-linear equations as well, particularly\u003cbr\u003esubstitution.\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePrerequisites:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Ellipses Centered at the Origin\u003cbr\u003e  \u00b7 Applications of Parabolas\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUnlocks:\u003c\u002fb\u003e\u003cbr\u003e  \u00b7 Conics in Polar Coordinates"],"marker":{"color":"#f0932b","line":{"color":"#111","width":1},"opacity":0.95,"size":12},"mode":"markers+text","name":"medium","text":["Hyperbolas Centered at the Orig
